<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movement Experiments</title>
  <link rel="stylesheet" href="global.css">
  <style>
    /* ── Controls bar ── */
    .controls-bar {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 32px 0 0;
      margin-bottom: 16px;
    }

    .controls-filters {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .filter-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 8px;
      flex: 1;
    }

    .pool-count {
      font-size: var(--text-small);
      color: var(--text-3);
      margin-top: 12px;
    }

    .pool-count strong {
      color: var(--text-2);
      font-weight: var(--weight-semibold);
    }

    .shuffle-btn {
      align-self: flex-start;
    }

    /* ── Experiment card ── */
    .experiment-card {
      padding: 44px;
      margin-bottom: 36px;
    }

    .exp-header {
      margin-bottom: 40px;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--border-light);
    }

    .exp-tags {
      display: none;
    }

    .exp-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .exp-title {
      flex: 1;
    }

    /* ── Sections ── */
    .exp-sections {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .exp-section {
      padding: 28px 0;
      border-bottom: 1px solid var(--border-light);
    }

    .exp-section:last-of-type {
      border-bottom: none;
    }

    .section-label {
      margin-bottom: 14px;
    }

    ol.rules-list {
      list-style: none;
      counter-reset: rule-n;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    ol.rules-list li {
      font-family: var(--font);
      font-size: var(--fs-body);
      line-height: 1.6;
      color: var(--text-2);
      counter-increment: rule-n;
      display: flex;
      gap: 14px;
    }

    ol.rules-list li::before {
      content: counter(rule-n) '.';

      flex-shrink: 0;
      min-width: 18px;
    }

    ul.item-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    ul.item-list li {
      font-family: var(--font);
      font-size: var(--fs-body);
      line-height: 1.6;
      color: var(--text-2);
      display: flex;
      gap: 12px;
    }

    ul.item-list li::before {
      content: '—';
      flex-shrink: 0;
    }

    .insight-body {
      font-family: var(--font);
      font-size: var(--fs-body);
      line-height: 1.6;
      color: var(--text-2);
    }

    .insight-body p+p {
      margin-top: 14px;
    }

    .reflect-block {
      margin-top: 28px;
      background: rgba(var(--ink-rgb), .04);
      border: 1px solid rgba(var(--ink-rgb), .14);
      border-radius: 0;
      padding: 22px 26px;
    }

    .reflect-block .section-label {
      margin-bottom: 6px;
    }

    .reflect-q {
      font-size: var(--text-body-lg);
      font-style: italic;
      font-weight: var(--weight-medium);
      color: var(--text-1);
    }

    /* ── Actions ── */
    .exp-actions {
      display: flex;
      gap: 10px;
      margin-top: 36px;
      padding-top: 32px;
      border-top: 1px solid var(--border-light);
      flex-wrap: wrap;
    }

    .btn-act {
      padding: 11px 22px;
      border-radius: var(--rf);
      font-size: var(--text-ui);
      font-weight: var(--weight-semibold);
      font-family: var(--font);
      cursor: pointer;
      transition: all .15s;
      border: 1px solid transparent;
    }

    #regen-btn {
      background: var(--ink-solid);
      color: var(--paper-solid);
      border-color: var(--ink-solid);
    }

    #regen-btn:hover {
      background: #2C2C28;
      opacity: 1;
    }

    #copy-btn {
      background: transparent;
      color: var(--text-2);
      border-color: rgba(var(--ink-rgb), .18);
    }

    #copy-btn:hover {
      background: rgba(var(--ink-rgb), .05);
      color: var(--text-1);
      border-color: rgba(var(--ink-rgb), .32);
    }

    #copy-btn.copied {
      color: var(--text-2);
      border-color: rgba(var(--ink-rgb), .28);
    }

    /* ── Favorites content ── */
    .fav-item {
      align-items: center;
    }

    .fav-name {
      font-size: var(--text-body-sm);
      color: var(--text-2);
      font-weight: var(--weight-medium);
      flex: 1;
    }

    .fav-item:hover .fav-name {
      color: var(--text-1);
    }

    @media (max-width: 580px) {
      .experiment-card {
        padding: 28px 22px;
      }

      .controls-filters {
        flex-direction: column;
        align-items: flex-start;
      }

      .shuffle-btn {
        align-self: stretch;
        justify-content: center;
      }

      .exp-actions {
        flex-direction: column;
      }

      .btn-act {
        text-align: center;
      }
    }
  </style>
</head>

<body class="has-sidebar">


  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="toast" id="toast"></div>

  <section class="hero">
    <div class="inner">
      <p class="label-1">Play before you plan.</p>
      <h3>Movement Experiments</h3>
      <p>Movement experiments that will expand, challenge, break patterns, encourage, teach, and shake-up what you know.
      </p>
    </div>
  </section>

  <div class="wrap">

    <div class="controls-bar">
      <div class="controls-filters">
        <div class="filter-chips" id="filter-chips">
          <button class="filter-chip" data-tag="props">Props</button>
          <button class="filter-chip" data-tag="floor">Floor-Based</button>
          <button class="filter-chip" data-tag="standing">Standing</button>
          <button class="filter-chip" data-tag="gaze">Gaze &amp; Focus</button>
          <button class="filter-chip" data-tag="arms-hands">Arms &amp; Hands</button>
          <button class="filter-chip" data-tag="mat-orientation">Mat Orientation</button>
          <button class="filter-chip" data-tag="slow-somatic">Slow &amp; Somatic</button>
          <button class="filter-chip" data-tag="sequencing">Creative Sequencing</button>
        </div>
      </div>
      <p class="pool-count"><strong id="pool-num">28</strong> available</p>
      <button class="shuffle-btn" id="shuffle-btn">
        <span class="material-symbols-sharp">shuffle</span>
        Shuffle
      </button>
    </div>

    <div id="experiment-card" class="experiment-card">
      <div class="exp-header">
        <div class="exp-tags" id="exp-tags"></div>
        <div class="exp-title-row">
          <h4 class="exp-title" id="exp-title"></h4>
          <button class="btn-icon" id="save-btn" title="Save experiment" data-tooltip="Save">
            <span class="material-symbols-sharp save-icon">bookmark</span>
          </button>
        </div>
      </div>
      <div class="exp-sections">
        <div class="exp-section">
          <div class="section-label label-1">The Rules</div>
          <ol class="rules-list" id="exp-rules"></ol>
        </div>
        <div class="exp-section">
          <div class="section-label label-1">Before You Begin</div>
          <ul class="item-list" id="exp-before"></ul>
        </div>
        <div class="exp-section">
          <div class="section-label label-1">As You Move</div>
          <ul class="item-list" id="exp-during"></ul>
        </div>
        <div class="exp-section">
          <div class="section-label label-1">When the Song Ends</div>
          <ul class="item-list" id="exp-after"></ul>
        </div>
        <div class="exp-section">
          <div class="section-label label-1">Teaching Insight</div>
          <div class="insight-body" id="exp-insight"></div>
        </div>
      </div>
      <div class="reflect-block">
        <div class="section-label label-1">Reflect</div>
        <p class="reflect-q" id="exp-reflect"></p>
      </div>
    </div>

    <div class="favorites-section">
      <div class="favs-header">
        <button class="favs-toggle" id="favs-toggle">
          Saved Experiments
          <span class="fav-badge empty" id="fav-badge">0</span>
          <span class="favs-arrow">&#9660;</span>
        </button>
        <button class="clear-all-btn" id="clear-btn">Clear all</button>
      </div>
      <div class="favs-body hidden" id="favs-body"></div>
    </div>


  </div>


  <script>
    // ─── DATA ────────────────────────────────────────────────────────────────────

    const TAG_LABELS = {
      'props': 'Props',
      'floor': 'Floor-Based',
      'standing': 'Standing',
      'gaze': 'Gaze & Focus',
      'arms-hands': 'Arms & Hands',
      'mat-orientation': 'Mat Orientation',
      'slow-somatic': 'Slow & Somatic',
      'sequencing': 'Creative Sequencing'
    };

    const EXPERIMENTS = [
      {
        id: 1,
        title: '5 Minutes to Move',
        tags: ['sequencing'],
        rules: [
          'Move for 5 minutes.',
          'Keep it continuous — no more than an inhale and exhale in each posture.',
          'No repeating a single pose. Each pose can only be used once, not once per side (one Warrior 2 total, not one on left AND right).'
        ],
        beforeYouBegin: [
          'Song recommendation: Gooey by Glass Animals.',
          'Set up your phone to video yourself so you can reference it later and/or share on social media with #MovementExperiments.',
          'Leave extra space around your mat so you can step off, turn around, and move in unexpected directions.'
        ],
        asYouMove: [
          'Once you press play on the song, set yourself up in any posture, take a breath, and begin to move.',
          'Remember you have many points of contact to explore: one foot, two feet, elbows, knees, back, belly, single arm, double arms, and sides. This isn\'t just about standing flow.',
          'If you notice yourself repeating a similar shape, experiment with changing the position of your legs, arms, or the lean of your torso to create something new.'
        ],
        whenSongEnds: [
          'Pause and take a breath.',
          'Shake it off.',
          'Reflect.'
        ],
        teachingInsight: 'Often, teachers find they are deeply in-bodied and time passes super fast. If that\'s you, fantastic. Finding the freedom to move in this experiment, while using the form of yoga postures, can be translated into the classes you teach. As teachers, we\'re here to help our students find this kind of freedom.\n\nIf you find it difficult, you are not alone. This often happens for teachers who come from a strict sequencing background with a set order of postures or pace, have always done or believed that practice "counts" if both left AND right sides move through the same sequence, or who never considered breaking out of what has always been done. It can feel like a frustrating experiment and super heady. You didn\'t do it wrong if this was you. This is just information.',
        reflectionPrompt: 'What\'s your takeaway?'
      },
      {
        id: 2,
        title: 'The Cheerleader',
        tags: ['arms-hands'],
        rules: [
          'Strike a pose.',
          'Stay in that pose until you move your arms in 5 different shapes — don\'t go fast.',
          'Choose another posture and repeat with 5 different arm movements.',
          'Repeat.'
        ],
        beforeYouBegin: [
          'Choose a song or two to move to.',
          'Set up your phone to video yourself so you can reference it later and/or share on social media with #MovementExperiments.',
          'Optional: use pom-poms or other playful props like trophies, plants, cups of water, cookies, or dish towels.'
        ],
        asYouMove: [
          'This experiment can be explored in all body positions: standing, seated, kneeling, or lying down.',
          'This experiment can be explored while you\'re on your hands, but it will be extra challenging — in Down Dog, one position will be both hands down, after that one or both hands will have to explore other placement or reaching.',
          'Let it be awkward. New things often are.'
        ],
        whenSongEnds: [
          'Pause and take a breath.',
          'Reflect.'
        ],
        teachingInsight: 'If you had to point out the ways we most cue and use arms in yoga, it\'s probably: both arms up, both arms down to your side, hands to heart, prayer twist, or both arms out in the shape of a T. All of these are great, and there\'s more ways we can use our arms both in postures and in transitions.\n\nHow we use our arms in a pose greatly impacts where it feels most natural to flow next. As you experiment with cueing more arm movement, allow the transitions to be just as important as the postures.',
        reflectionPrompt: 'What\'s your takeaway?'
      },
      {
        id: 3,
        title: 'Alternate the Bend',
        tags: ['sequencing', 'standing'],
        rules: [
          'Choose a standing posture.',
          'As you move into each new posture, alternate the bend in one or both legs (moving between bent and straight).',
          'Repeat the phrase "change one or both" every time you move.'
        ],
        beforeYouBegin: [
          'Choose a song or two to move to.',
          'Set up your phone to video yourself so you can reference it later and/or share on social media with #MovementExperiments.'
        ],
        asYouMove: [
          'The first time you try this experiment, stay in standing postures.',
          'As you become more familiar, begin to explore "changing one or both" while kneeling, seated, on your belly, and/or on your back.'
        ],
        whenSongEnds: [
          'Pause and take a breath.',
          'Reflect.'
        ],
        teachingInsight: 'This experiment will change sequencing everywhere if every teacher played with it. We\'re really playing with that "flow" feeling as we move between bent and straight legs. This is part of how flow can feel like a "yoga dance."\n\nThere is often a focus on the front leg in a class — this experiment changes that. If you\'ve ever led or been in a class where you kept your front leg bent for 8 postures in a row and it\'s burning, that\'s one way. This is another.\n\nAs you begin, it\'s gonna be a brain game. The more often you do this experiment, the more natural it will become. It might be interesting to go to others\' classes and pay attention to how this does or does not happen and what the feeling is with or without it.',
        reflectionPrompt: 'What\'s your takeaway?'
      },
      {
        id: 4,
        title: 'Chair the Top',
        tags: ['props'],
        rules: [
          'Set up a stable chair — anchor the front feet on the top end of your mat so it doesn\'t slide.',
          'Use the chair as you move. Let it be part of your flow, expanding how you typically think about "chair yoga."'
        ],
        beforeYouBegin: [
          'Choose a song or two to move to.',
          'Set up your phone to video yourself so you can reference it later and/or share on social media with #MovementExperiments.',
          'Make sure the chair is sturdy enough for your weight so you feel comfortable stepping onto it.',
          'Keeping the front chair feet on your mat helps prevent the chair from sliding.'
        ],
        asYouMove: [
          'Notice how the chair can offer support, challenge, or entirely new possibilities.',
          'Explore beyond your usual ideas of "chair yoga." Let the chair make things easier or more demanding, depending on how you engage with it.'
        ],
        whenSongEnds: [
          'Pause and take a breath.',
          'Reflect.'
        ],
        teachingInsight: 'When we think of "chair yoga," we often picture older folks, people with limited mobility, strength, and stability, or those recovering from injury. It\'s typically taught to make a class objectively easier. We love this.\n\nIn this experiment, we expand outside the typical definition. You can certainly make postures more accessible with a chair, but you can also make them more challenging. Remember that "easy" and "hard" are personal. Explore using the chair in wild ways. Let it be weird. What happens when you play with a prop in a new way? How would using a chair like this in class help students explore the practice and their bodies in new ways?',
        reflectionPrompt: 'What\'s your takeaway?'
      },
      {
        id: 5,
        title: 'Roly-Poly',
        tags: ['floor', 'slow-somatic'],
        rules: [
          'Begin low to the ground — drop into a posture close to the floor.',
          'Stay low and keep moving. Emphasize rolling, wiggling, and movements that keep as much of your body in contact with the ground as possible.',
          'Avoid long holds. This is not a stretch-and-stay practice — let movement remain continuous and fluid.'
        ],
        beforeYouBegin: [
          'Choose a song or two to move to.',
          'Set up your phone to video yourself so you can reference it later and/or share on social media with #MovementExperiments.',
          'Consider practicing without a mat, or wear socks on a slippery surface to support rolling, sliding, and ease of movement.'
        ],
        asYouMove: [
          'Let this experiment look different from a typical "practice." That\'s part of the invitation.',
          'Use yoga postures softly, allowing them to blur, melt, and evolve as you stay close to the ground.',
          'Emphasize sensation over shape.',
          'Let it be weird.'
        ],
        whenSongEnds: [
          'Pause and take a breath.',
          'Reflect.'
        ],
        teachingInsight: 'This one might get weird and not look like your typical "practice." That\'s perfect. A movement experiment is not about planning a class, but about finding play as a teacher. If you have a play practice and connect to your body, the way you show up in a room is more grounded and honest.\n\nThis experiment is about using yoga postures, but softly so. While you may not teach a class like this, allowing yourself to drape against the ground and move with the earth is a powerful practice. Remember, as teachers, it\'s our goal to be the weirdest one in the room.',
        reflectionPrompt: 'What\'s your takeaway?'
      },
      {
        id: 6,
        title: 'Watch the Hand',
        tags: ['gaze', 'slow-somatic'],
        rules: [
          'Keep your gaze on your hand. Move continuously while keeping your eyes on one hand the entire time.',
          'Switch hands intentionally. If you want to change which hand you\'re watching, bring both hands together before switching your gaze.'
        ],
        beforeYouBegin: [
          'Choose a song or two to move to.',
          'Set up your phone to video yourself so you can reference it later and/or share on social media with #MovementExperiments.',
          'Make sure you have a clear, open space to move in.'
        ],
        asYouMove: [
          'Choose a specific point on your hand to focus on — such as the tip of your middle finger — or imagine you\'re holding a glowing object like a golden orb.',
          'Move slowly so you don\'t get dizzy.',
          'You don\'t have to stay standing — explore getting on and off the ground too.'
        ],
        whenSongEnds: [
          'Pause and take a breath.',
          'Reflect.'
        ],
        teachingInsight: 'In Warrior 2, we often gaze at or past our front middle finger, but beyond that, there\'s not often a cue to keep our gaze in one spot while moving. Having continual attention on your hand brings a whole different pace and movement pattern. You might find yourself gazing in new directions throughout this experiment.\n\nHow can this impact your sequencing? Where do you cue to look? How does gaze affect transitions?',
        reflectionPrompt: 'What\'s your takeaway?'
      },
      {
        id: 7,
        title: 'Touch the Block',
        tags: ['props'],
        rules: [
          'Continuously touch at least one block the entire time.',
          'Any part of your body can touch the block to count.'
        ],
        beforeYouBegin: [
          'Choose a song or two to move to.',
          'Set up your phone to video yourself so you can reference it later and/or share on social media with #MovementExperiments.'
        ],
        asYouMove: [
          'Allow yourself to move in all directions.',
          'Knees and elbows on the block count too.'
        ],
        whenSongEnds: [
          'Pause and take a breath.',
          'Reflect.'
        ],
        teachingInsight: 'Using blocks in our practice is mostly given as a way to make a posture or transition more easeful. This experiment challenges and expands how you use blocks. Let it make a transition or pose harder. Let it be weird. Let it be wayyyyy outside the box of what you usually do with blocks.\n\nHow have you been using blocks in your classes? What would happen if you cued a block for the entire class — not just a side-piece, but necessary? What new ways of using a block come to you when you have to use it continuously? How might a block aid a pose in a way that you\'ve never tried?',
        reflectionPrompt: 'What\'s your takeaway?'
      },
      {
        id: 8,
        title: 'Stay',
        tags: ['slow-somatic', 'floor'],
        rules: [
          'Begin in a long lunge twist (either with prayer hands or swoosh your arms to the side) and make sure you\'re in a deep knee bend to make it spicy.',
          'STAY in that pose until you feel what your body wants next — not what your brain says comes next. Don\'t move until you feel it.',
          'Once you move into a new pose, STAY again until you feel what your body wants, not what you typically do next just because it\'s "what is done" — pay attention to how your body feels on the inside.'
        ],
        beforeYouBegin: [
          'Choose a song or two to move to.',
          'Set up your phone to video yourself so you can reference it later and/or share on social media with #MovementExperiments.'
        ],
        asYouMove: [
          'This isn\'t a fast movement experience — let it be slow.',
          'After about 8 postures, if you can sense an inner felt sense of the postures, you can play with speeding up your flow.'
        ],
        whenSongEnds: [
          'Pause and take a breath.',
          'Reflect.'
        ],
        teachingInsight: 'This is a potent experiment. Sequencing has long been passed down as a particular pattern and order. With this experiment, we tap into not just what our brain has learned but how it feels. Sequencing that feels good — natural and organic — can 100% exist and still use traditional postures, but perhaps in new orders and with new transitions. Let this teach you what your body wants.\n\nWhat is getting tired in a pose? What feels constricted or working or expanded or easy or not challenging or simple or complicated? What would feel delicious to your body next? How can you treat this as a movement puzzle from the inside out?',
        reflectionPrompt: 'What\'s your takeaway?'
      },
      {
        id: 9,
        title: 'Be a Wave',
        tags: ['floor', 'sequencing'],
        rules: [
          'Begin seated on your knees at the back of the mat.',
          'Make your way to standing at the front of the mat like a wave — take the long way to get there.',
          'Return backward to sit on your knees at the back of the mat without repeating the same sequence.',
          'Repeat this 2x total, making it a different sequence every time.'
        ],
        beforeYouBegin: [
          'Choose a song or two to move to.',
          'Set up your phone to video yourself so you can reference it later and/or share on social media with #MovementExperiments.',
          'Doing the Alternate the Bend experiment first may be helpful.'
        ],
        asYouMove: [
          'Use all the sides of the mat, use the floor, make it a winding path.'
        ],
        whenSongEnds: [
          'Pause and take a breath.',
          'Reflect.'
        ],
        teachingInsight: 'A wave crashes up on the shore and then pulls back — over and over, there\'s a push and pull to it. There\'s a give and take. Being a wave as you flow means you\'re finding that feeling of reaching forward, then pulling back. It\'s being expansive, then receding.\n\nWhen you move like this, your body and breath might find common ground. Think of your lungs filling with air, then releasing it. If you want to play with moving your body to your breath, imagine your external body is doing the breathing as you move.',
        reflectionPrompt: 'What\'s your takeaway?'
      },
      {
        id: 10,
        title: 'Use a Wall',
        tags: ['props'],
        rules: [
          'Set the short or long end of your mat up against the wall.',
          'Make the wall an integral part of your flow, not an afterthought — how many times can you touch the wall in your flow?'
        ],
        beforeYouBegin: [
          'Choose a song or two to move to.',
          'Set up your phone to video yourself so you can reference it later and/or share on social media with #MovementExperiments.'
        ],
        asYouMove: [
          'Touch the wall as often as possible throughout your flow.',
          'It will be a different experience facing the wall versus facing away from it.',
          'Use the wall with different body parts — hands, feet, hips, knees, elbows, back, belly.'
        ],
        whenSongEnds: [
          'Pause and take a breath.',
          'Reflect.'
        ],
        teachingInsight: 'Using a wall in practice could provide more balance, security getting upside down, and assist to explore shapes in new ways. Some things might feel easier, and some might feel trickier. We don\'t often get to play with a wall in a yoga studio, so in this home play practice, you can really let yourself get wild and creative.\n\nOnce you have played with the short end of the mat against the wall, try the long end next to the wall. The way you sequence, the postures you\'re called to, and the way the wall provides feedback will change.',
        reflectionPrompt: 'What\'s your takeaway?'
      },
      {
        id: 11,
        title: 'Long Side Front Side',
        tags: ['mat-orientation', 'sequencing'],
        rules: [
          'Declare the long side as the "front side" of the mat (not the short end).',
          'Begin in a single-leg Tadasana facing the long side of the mat.',
          'Move through a flow and find your way back to a single-leg Tadasana facing the long side.'
        ],
        beforeYouBegin: [
          'Choose a song or two to move to.',
          'Set up your phone to video yourself so you can reference it later and/or share on social media with #MovementExperiments.'
        ],
        asYouMove: [
          'Just like in a regular flow where the short side is the front, we turn sideways to the long sides in postures like Star, Warrior 2, Triangle, etc. — in this experiment, you can turn to the short sides of the mat.'
        ],
        whenSongEnds: [
          'Pause and take a breath.',

    // ─── STATE ───────────────────────────────────────────────────────────────────

    let activeFilters = new Set();
    let lastId = null;
    let favorites = JSON.parse(localStorage.getItem('flowschool_favs') || '[]');
    // Migrate old format (array of numbers) to array of objects
    if (favorites.length && typeof favorites[0] === 'number') {
      favorites = favorites.map(id => {
        const exp = EXPERIMENTS.find(e => e.id === id);
        return { id, title: exp ? exp.title : String(id), savedAt: Date.now() };
      });
      localStorage.setItem('flowschool_favs', JSON.stringify(favorites));
    }

    // ─── POOL ────────────────────────────────────────────────────────────────────

    function getPool() {
      if (activeFilters.size === 0) return EXPERIMENTS;
      return EXPERIMENTS.filter(e => e.tags.some(t => activeFilters.has(t)));
    }

    function updatePoolCount() {
      const n = getPool().length;
      document.getElementById('pool-num').textContent = n;
      document.getElementById('shuffle-btn').disabled = n === 0;
    }

    // ─── RENDER ──────────────────────────────────────────────────────────────────

    function renderExperiment(exp) {
      const card = document.getElementById('experiment-card');

      // Tags
      const tagsEl = document.getElementById('exp-tags');
      tagsEl.innerHTML = exp.tags.map(t =>
        `<span class="exp-tag">${TAG_LABELS[t] || t}</span>`
      ).join('');

      // Title
      document.getElementById('exp-title').textContent = exp.title;

      // Lists
      const fill = (id, items, ordered) => {
        const el = document.getElementById(id);
        el.innerHTML = items.map(item => `<li>${item}</li>`).join('');
      };
      fill('exp-rules', exp.rules);
      fill('exp-before', exp.beforeYouBegin);
      fill('exp-during', exp.asYouMove);
      fill('exp-after', exp.whenSongEnds);

      // Teaching insight (split paragraphs)
      const insightEl = document.getElementById('exp-insight');
      insightEl.innerHTML = exp.teachingInsight.split('\n\n')
        .map(p => `<p>${p}</p>`).join('');

      // Reflection
      document.getElementById('exp-reflect').textContent = exp.reflectionPrompt;

      // Save button state
      updateSaveBtn(exp.id);

      // Animate in
      card.classList.remove('animate');
      void card.offsetWidth;
      card.classList.add('animate');
    }

    // ─── GENERATE ────────────────────────────────────────────────────────────────

    function generate() {
      const pool = getPool();
      if (!pool.length) return;

      let candidates = pool.filter(e => e.id !== lastId);
      if (!candidates.length) candidates = pool;

      const exp = candidates[Math.floor(Math.random() * candidates.length)];
      lastId = exp.id;
      renderExperiment(exp);
    }

    // ─── FILTERS ─────────────────────────────────────────────────────────────────

    document.getElementById('filter-chips').addEventListener('click', e => {
      const chip = e.target.closest('.filter-chip');
      if (!chip) return;
      const tag = chip.dataset.tag;
      const wasActive = activeFilters.has(tag);

      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      activeFilters.clear();

      if (!wasActive) {
        activeFilters.add(tag);
        chip.classList.add('active');
      }

      updatePoolCount();

      if (activeFilters.size > 0 && lastId !== null) {
        const cur = EXPERIMENTS.find(e => e.id === lastId);
        if (cur && !cur.tags.some(t => activeFilters.has(t))) generate();
      }
    });

    // ─── ACTIONS ─────────────────────────────────────────────────────────────────

    document.getElementById('shuffle-btn').addEventListener('click', generate);

    document.getElementById('save-btn').addEventListener('click', () => {
      if (!lastId) return;
      const idx = favorites.findIndex(f => f.id === lastId);
      if (idx === -1) {
        const exp = EXPERIMENTS.find(e => e.id === lastId);
        favorites.push({ id: lastId, title: exp ? exp.title : String(lastId), savedAt: Date.now() });
        toast('Experiment saved.');
      } else {
        favorites.splice(idx, 1);
        toast('Experiment removed.');
      }
      saveFavorites();
      updateSaveBtn(lastId);
      renderFavsList();
    });

    function updateSaveBtn(id) {
      const btn = document.getElementById('save-btn');
      const saved = favorites.some(f => f.id === id);
      btn.classList.toggle('saved', saved);
      btn.title = saved ? 'Saved' : 'Save experiment';
      btn.querySelector('.save-icon').textContent = 'bookmark';
    }

    // ─── FAVORITES ───────────────────────────────────────────────────────────────

    function saveFavorites() {
      localStorage.setItem('flowschool_favs', JSON.stringify(favorites));
      updateFavBadge();
    }

    function updateFavBadge() {
      const badge = document.getElementById('fav-badge');
      badge.textContent = favorites.length;
      badge.classList.toggle('empty', favorites.length === 0);
    }

    function renderFavsList() {
      const body = document.getElementById('favs-body');
      if (favorites.length === 0) {
        body.innerHTML = '<p class="favs-empty">No saved experiments yet. Shuffle one and save it.</p>';
        return;
      }
      body.innerHTML = favorites.map(f => {
        const exp = EXPERIMENTS.find(e => e.id === f.id);
        if (!exp) return '';
        return `
      <div class="fav-item">
        <span class="fav-name">${exp.title}</span>
        <div class="fav-btns">
          <button class="fav-view-btn" data-id="${f.id}">View</button>
          <button class="fav-rm-btn" data-id="${f.id}" title="Remove">✕</button>
        </div>
      </div>`;
      }).join('');
    }

    document.getElementById('favs-toggle').addEventListener('click', () => {
      const body = document.getElementById('favs-body');
      const toggle = document.getElementById('favs-toggle');
      const open = body.classList.toggle('hidden');
      toggle.classList.toggle('open', !open);
      if (!open) renderFavsList();
    });

    document.getElementById('favs-body').addEventListener('click', e => {
      const viewBtn = e.target.closest('.fav-view-btn');
      const rmBtn = e.target.closest('.fav-rm-btn');
      if (viewBtn) {
        const id = parseInt(viewBtn.dataset.id);
        const exp = EXPERIMENTS.find(e => e.id === id);
        if (exp) { lastId = id; renderExperiment(exp); }
      }
      if (rmBtn) {
        const id = parseInt(rmBtn.dataset.id);
        favorites = favorites.filter(f => f.id !== id);
        saveFavorites();
        renderFavsList();
        if (lastId === id) updateSaveBtn(id);
      }
    });

    document.getElementById('clear-btn').addEventListener('click', () => {
      if (!favorites.length) return;
      favorites = [];
      saveFavorites();
      renderFavsList();
      if (lastId) updateSaveBtn(lastId);
      toast('Saved experiments cleared.');
    });

    // ─── TOAST ───────────────────────────────────────────────────────────────────

    let toastTimer = null;
    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
    }

    // ─── INIT ────────────────────────────────────────────────────────────────────

    updatePoolCount();
    updateFavBadge();

    const _urlExp = new URLSearchParams(window.location.search).get('exp');
    if (_urlExp) {
      const _exp = EXPERIMENTS.find(e => e.id === parseInt(_urlExp));
      if (_exp) { lastId = _exp.id; renderExperiment(_exp); updateSaveBtn(_exp.id); }
      else { generate(); }
    } else { generate(); }
  </script>
  <script src="lib/nav.js"></script>
  <script src="lib/tracker.js"></script>

</body>

</html>
