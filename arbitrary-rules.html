<html lang="en">

<head>
  <meta charset="UTF-8">
  <script>!function(){var t=localStorage.getItem("fs-theme");document.documentElement.setAttribute("data-theme",t||"dark")}()</script>
  <style>html{background:#151515;color-scheme:dark}html[data-theme="light"]{background:#F5F4F0;color-scheme:light}</style>
  <link rel="icon" href="img/flow-school-favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="global.css">
  <style>
    /* ── the draw keys — choosing the count IS the draw ── */
    .ready-draw {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .ready-ask {
      font-size: var(--text-ui);
      color: var(--text-2);
    }
    .ready-nums { display: flex; gap: 8px; }
    /* square keys, same family as .btn-secondary (border, hover, no lift) */
    .ready-num {
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid rgba(var(--ink-rgb), .18);
      border-radius: var(--rb);
      font-family: var(--font-mono);
      font-size: var(--fs-h5);
      color: var(--text-2);
      cursor: pointer;
      transition: color var(--transition-base), border-color var(--transition-base), background var(--transition-base), transform var(--transition-fast);
    }
    /* the press note — the chip active-scale, acknowledging the choice */
    .ready-num:active, .redraw-num:active { transform: scale(.97); }
    /* keys light only under the cursor — the deck riffle carries the
       "this is live" signal; the keys stay a deliberate choice */
    .ready-num:hover {
      color: var(--text-1);
      border-color: rgba(var(--ink-rgb), .35);
      background: rgba(var(--ink-rgb), .05);
    }

    /* ── the exit — a quiet centered text link below the rules
       (the pose-popcorn advance grammar: ink ramps, the arrow gap
       widens); no seam above it — the rules end and the exit simply
       waits below them ── */
    .rule-build {
      display: flex;
      justify-content: center;
      margin-top: 24px;
    }

    #build-class-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0;
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font);
      font-size: var(--text-ui);
      font-weight: var(--weight-semibold);
      color: var(--text-2);
      transition: color var(--transition-base), gap var(--transition-base);
    }

    #build-class-btn:hover {
      color: var(--text-1);
      gap: 12px;
    }

    /* ── Redraw row — Draw again + compact count keys ── */
    .redraw {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .redraw-nums { display: flex; gap: 8px; }
    /* smaller siblings of .ready-num; active count inverts to solid ink
       (the compact count-button pattern) */
    .redraw-num {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid rgba(var(--ink-rgb), .18);
      border-radius: var(--rb);
      font-family: var(--font-mono);
      font-size: var(--fs-chip);
      color: var(--text-2);
      cursor: pointer;
      transition: color var(--transition-base), border-color var(--transition-base), background var(--transition-base), transform var(--transition-fast);
    }
    .redraw-num:hover {
      color: var(--text-1);
      border-color: rgba(var(--ink-rgb), .35);
      background: rgba(var(--ink-rgb), .05);
    }
    .redraw-num.active {
      background: var(--ink-solid);
      border-color: var(--ink-solid);
      color: var(--paper-solid);
    }

    /* ── Challenge card ── */
    .challenge-card {
      padding: 48px;
      margin-bottom: 40px;
    }


    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 8px;
    }

    /* Single rule */
    .rule-text {
      font-family: var(--font);
      font-size: var(--fs-h4);
      font-weight: var(--weight-regular) !important;
      letter-spacing: -.01em;
      line-height: var(--lh-heading);
      color: var(--text-1);
      margin-bottom: 4px;
    }

    .rule-invite {
      font-size: var(--text-body-sm);
      color: var(--text-3);
      font-style: italic;
    }

    /* Multi rules */
    .challenge-label {}

    .rule-items {
      display: flex;
      flex-direction: column;
    }

    .rule-item {
      display: flex;
      gap: 20px;
      padding: 24px 0;
      border-bottom: 1px solid var(--border-light);
    }

    .rule-item:first-child {
      padding-top: 0;
    }

    .rule-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .rule-n {
      flex-shrink: 0;
      min-width: 20px;
      padding-top: 4px;
      font-variant-numeric: tabular-nums;
    }

    .rule-cat {
      display: none;
    }



    /* Card actions */
    .card-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 40px;
      padding-top: 28px;
      border-top: 1px solid var(--border-light);
    }

    @media (max-width: 580px) {
      .challenge-card {
        padding: 28px 24px;
      }

      .rule-text-single {
        font-size: clamp(1.5rem, 6vw, 2rem);
      }
    }
  </style>
</head>

      { id: 77, cat: 'wildcard', text: "Build this class for a body that's been sitting all day." },
      { id: 79, cat: 'wildcard', text: 'Build the whole class around one transition you find beautiful.' },
      { id: 82, cat: 'wildcard', text: 'Design the flow around the word "enough."' },
      { id: 170, cat: 'wildcard', text: 'Design the flow around the word "big."' },
      { id: 171, cat: 'wildcard', text: 'Design the flow around the word "dance."' },
      { id: 123, cat: 'wildcard', text: 'Build a class for a body that is tired.' },
      { id: 127, cat: 'wildcard', text: "Build a class you've been too afraid to teach." },
    ];

    const INVITES = [
      'Build a flow. See what happens.',
      'Everything is an experiment.',
      'There is more than one way to be right.',
      'Play before you plan.',
      'There are no rules. Except this one.',
      'Curiosity over certainty.',
      'Let it be easy.',
      'Free to move.',
      'Perfect is boring. This is better.',
      'Choose your own adventure from here.',
    ];

    // ─── STATE ───────────────────────────────────────────────────────────────────

    let ruleCount = 1;
    let currentRuleIds = [];
    let saved = JSON.parse(localStorage.getItem('flowschool_arules') || '[]');

    // ─── GENERATE ────────────────────────────────────────────────────────────────

    function pickRules(count) {
      // Hard rule: one rule per category — a 3-rule challenge always spans
      // 3 different categories (which also caps "start" at one). n can never
      // exceed the number of categories in the deck.
      const catCount = new Set(RULES.map(r => r.cat)).size;
      const n = Math.min(count, catCount);
      const shuffled = [...RULES].sort(() => Math.random() - 0.5);
      const selected = [];
      const usedCats = new Set();

      for (const r of shuffled) {
        if (selected.length >= n) break;
        if (usedCats.has(r.cat)) continue;
        selected.push(r);
        usedCats.add(r.cat);
      }

      return selected;
    }

    // ─── READY — the deck, face down ─────────────────────────────────────────────
    // Nothing is dealt until asked: the first draw is the game.

    // every possible hand across the 1/2/3 draws, honoring the game's own
    // constraints (no duplicates, at most one Starting Position per draw)
    function comboCount() {
      // one rule per category: a pair spans 2 categories, a triple spans 3 —
      // count via elementary symmetric sums of the per-category counts
      const counts = {};
      RULES.forEach(r => { counts[r.cat] = (counts[r.cat] || 0) + 1; });
      const c = Object.values(counts);
      const e1 = c.reduce((a, b) => a + b, 0);                    // singles
      const p2 = c.reduce((a, b) => a + b * b, 0);
      const p3 = c.reduce((a, b) => a + b * b * b, 0);
      const e2 = (e1 * e1 - p2) / 2;                              // cross-category pairs
      const e3 = (e1 * e1 * e1 - 3 * e1 * p2 + 2 * p3) / 6;       // cross-category triples
      return e1 + e2 + e3;
    }

    function renderReady() {
      const card = document.getElementById('challenge-card');
      card.classList.add('deck-stack');
      card.innerHTML = `
        <div class="ready-state" id="ready-state">
          <span class="ready-count">${comboCount().toLocaleString()} possible combinations</span>
          <div class="ready-draw">
            <span class="ready-ask">How many rules?</span>
            <div class="ready-nums">
              <button class="ready-num" data-n="1">1</button>
              <button class="ready-num" data-n="2">2</button>
              <button class="ready-num" data-n="3">3</button>
            </div>
          </div>
        </div>`;
      // the number IS the draw — count is chosen once, redraws repeat it
      document.getElementById('ready-state').addEventListener('click', e => {
        const btn = e.target.closest('.ready-num');
        if (!btn) return;
        ruleCount = parseInt(btn.dataset.n, 10);
        generate();
      });
    }

    function generate() {
      const rules = pickRules(ruleCount);
      if (!rules.length) return;
      rules.sort((a, b) => (a.cat === 'start' ? -1 : b.cat === 'start' ? 1 : 0));
      currentRuleIds = rules.map(r => r.id);
      renderCard(rules);
    }

    // ─── RENDER CARD ─────────────────────────────────────────────────────────────

    function renderCard(rules) {
      const card = document.getElementById('challenge-card');
      const firstDraw = card.classList.contains('deck-stack');
      document.getElementById('redraw').hidden = false; // the redraw earns its place after the first draw
      syncRedrawNums(); // the active key tracks the count just dealt
      const alreadySaved = isChallengeInSaved(currentRuleIds);
      const saveBtn = `<button class="btn-icon${alreadySaved ? ' saved' : ''}" id="save-btn" title="${alreadySaved ? 'Saved' : 'Save challenge'}" data-tooltip="Save"><span class="material-symbols-sharp save-icon">bookmark</span></button>`;

      // the exit — the rule's whole point is the flow it starts
      const buildBtn = `
      <div class="rule-build">
        <button type="button" id="build-class-btn">
          Build a flow with ${rules.length === 1 ? 'this' : 'these'}
          <span class="material-symbols-sharp i-md">arrow_forward</span>
        </button>
      </div>`;

      const fill = () => {
        if (rules.length === 1) {
          const r = rules[0];
          const invite = INVITES[Math.floor(Math.random() * INVITES.length)];
          card.innerHTML = `
        <div class="card-top">
          <div class="challenge-label label-1">Your Rule</div>
          ${saveBtn}
        </div>
        <div class="rule-text">${r.text}</div>
        <span class="rule-cat tag">${CATEGORIES[r.cat]}</span>
        ${buildBtn}`;
        } else {
          card.innerHTML = `
        <div class="card-top">
          <div class="challenge-label label-1">Your Challenge</div>
          ${saveBtn}
        </div>
        <div class="rule-items">
          ${rules.map((r, i) => `
            <div class="rule-item">
              <span class="rule-n label-2">0${i + 1}</span>
              <div>
                <div class="rule-text">${r.text}</div>
                <span class="rule-cat tag">${CATEGORIES[r.cat]}</span>
              </div>
            </div>`).join('')}
        </div>
        ${buildBtn}`;
        }

        document.getElementById('save-btn').addEventListener('click', handleSave);
        document.getElementById('build-class-btn').addEventListener('click', function () {
          // fs-seed — the Play → Plan handoff: the flow editor's new-draft
          // path consumes this and pins the rules as the flow's challenge
          const texts = currentRuleIds
            .map(id => RULES.find(r => r.id === id)).filter(Boolean).map(r => r.text);
          if (!texts.length) return;
          try {
            localStorage.setItem('fs-seed', JSON.stringify({ type: 'rules', rules: texts, ts: Date.now() }));
          } catch (_) {}
          window.location.href = 'your-flows?new=1';
        });

      };

      if (firstDraw) {
        // the deal — the peeking cards drop away as the card leaves the
        // deck. Redraws swap the face in place, never replay the entrance.
        const reveal = () => {
          card.classList.remove('deck-dealt');
          card.classList.remove('deck-stack'); // the card leaves the deck
          fill();
          card.classList.remove('animate');
          void card.offsetWidth;
          card.classList.add('animate');
        };
        const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        if (!reduce && document.readyState !== 'loading') {
          card.classList.add('deck-dealt');
          setTimeout(reveal, 150);
        } else {
          reveal();
        }
      } else {
        fsSwapCard(card, fill);
      }
    }

    // ─── SAVE ────────────────────────────────────────────────────────────────────

    function isChallengeInSaved(ids) {
      return saved.some(c => c.ids.length === ids.length && c.ids.every((id, i) => id === ids[i]));
    }

    function handleSave() {
      if (isChallengeInSaved(currentRuleIds)) {
        saved = saved.filter(c => !(c.ids.length === currentRuleIds.length && c.ids.every((id, i) => id === currentRuleIds[i])));
        toast('Challenge removed.');
      } else {
        const savedRules = currentRuleIds.map(id => RULES.find(r => r.id === id)).filter(Boolean);
        const title = savedRules.map(r => r.text).join(' · ');
        saved.push({ id: Date.now(), ids: [...currentRuleIds], title });
        toast('Challenge saved.');
      }
      localStorage.setItem('flowschool_arules', JSON.stringify(saved));
      const btn = document.getElementById('save-btn');
      if (btn) {
        const nowSaved = isChallengeInSaved(currentRuleIds);
        btn.classList.toggle('saved', nowSaved);
        btn.title = nowSaved ? 'Saved' : 'Save challenge';
        btn.querySelector('.save-icon').textContent = 'bookmark';
      }
    }

    // saved challenges live on the Saved page (saved.html) — this page
    // only writes them (the bookmark on the card) and honors ?challenge=
    // deep links back in.

    // ─── GENERATE BUTTON ─────────────────────────────────────────────────────────

    document.getElementById('generate-btn').addEventListener('click', generate);

    // the count keys keep the ready state's contract: the number IS the draw
    function syncRedrawNums() {
      document.querySelectorAll('.redraw-num').forEach(b => {
        b.classList.toggle('active', parseInt(b.dataset.n, 10) === ruleCount);
      });
    }
    document.querySelector('.redraw-nums').addEventListener('click', e => {
      const btn = e.target.closest('.redraw-num');
      if (!btn) return;
      ruleCount = parseInt(btn.dataset.n, 10);
      generate();
    });

    // ─── INIT ────────────────────────────────────────────────────────────────────


    const _urlChallenge = new URLSearchParams(window.location.search).get('challenge');
    if (_urlChallenge) {
      const _entry = saved.find(c => String(c.id) === _urlChallenge);
      if (_entry) {
        const _rules = _entry.ids.map(id => RULES.find(r => r.id === id)).filter(Boolean);
        if (_rules.length) {
          currentRuleIds = [..._entry.ids];
          ruleCount = _rules.length;
          renderCard(_rules);
        } else { renderReady(); }
      } else { renderReady(); }
    } else { renderReady(); }
  </script>
  <script src="lib/toast.js"></script>
  <script src="lib/tracker.js"></script>
</body>

</html>
