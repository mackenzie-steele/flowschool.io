<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <script>!function(){var t=localStorage.getItem("fs-theme");document.documentElement.setAttribute("data-theme",t||"dark")}()</script>
  <style>html{background:#1B1B1B;color-scheme:dark}html[data-theme="light"]{background:#F5F4F0;color-scheme:light}</style>
  <link rel="icon" href="img/flow-school-favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Stories — Flow School</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Sharp:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
  <link rel="stylesheet" href="global.css">
  <style>
    /* ── Library bar — search + actions ── */
    .library-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .library-bar[hidden] { display: none; }

    .library-bar .search-wrap { flex: 1; }

    .library-bar .btn-primary {
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: var(--r-cta);
    }

    @media (max-width: 580px) {
      .library-bar { flex-wrap: wrap; }
      .library-bar .search-wrap { flex-basis: 100%; }
    }

    /* ── Story index — typography first ── */
    .story-index { margin-top: 24px; }

    .story-row {
      display: flex;
      align-items: baseline;
      gap: 20px;
      padding: 24px 0;
      border-bottom: 1px solid var(--border-light);
      text-decoration: none;
      color: inherit;
    }

    .story-row:last-child { border-bottom: none; }

    .story-row-main { flex: 1; min-width: 0; }

    .story-row-title {
      font-size: var(--fs-h5);
      font-weight: var(--weight-regular);
      letter-spacing: -.01em;
      line-height: var(--lh-heading);
      color: var(--text-1);
      margin-bottom: 8px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      transition: opacity var(--transition-base);
    }

    .story-row:hover .story-row-title { opacity: .65; }

    .story-row-meta {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: .04em;
      color: var(--text-3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }

    .story-row-date {
      flex-shrink: 0;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-3);
      white-space: nowrap;
    }

    /* ── Detail view — bar component from global.css ── */
    /* display:flex on these groups would defeat the hidden attribute */
    .post-actions [hidden],
    .post-actions[hidden],
    .post-edit-actions[hidden] { display: none; }

    .post-head .post-actions { position: relative; }

    .post {
      max-width: 640px;
    }

    .post-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
    }

    .post-head-main { min-width: 0; }
    .post-head .post-actions { flex-shrink: 0; margin-top: -4px; }

    .post-title {
      font-size: var(--fs-h4);
      font-weight: var(--weight-regular);
      letter-spacing: -.01em;
      line-height: var(--lh-heading);
      color: var(--text-1);
      margin-bottom: 12px;
    }

    /* the starter is provenance, not the headline */
    .post-starter-line {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: .04em;
      color: var(--text-3);
      margin-bottom: 8px;
    }

    .post-title-input {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      padding: 0 0 16px;
      color: var(--text-1);
      font-family: var(--font);
      font-size: var(--fs-h4);
      font-weight: var(--weight-regular);
      letter-spacing: -.01em;
      line-height: var(--lh-heading);
    }

    .post-title-input::placeholder { color: var(--text-3); }

    .post-body p {
      font-size: var(--text-body-lg);
      line-height: 1.8;
      color: var(--text-1);
      margin-bottom: 1.2em;
    }

    .post-body p:last-child { margin-bottom: 0; }

    .post-meta {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: .04em;
      color: var(--text-3);
      margin-bottom: 24px;
    }

    /* ── Edit mode — a forever page, not a form field ──
       The textarea is invisible: same type as the finished post,
       auto-grows with the writing, the page itself scrolls. */
    .post-edit-area {
      width: 100%;
      min-height: 32vh;
      display: block;
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0;
      color: var(--text-1);
      font-family: var(--font);
      font-size: var(--text-body-lg);
      line-height: 1.8;
      outline: none;
      resize: none;
      overflow: hidden;
    }

    @media (max-width: 580px) {
      .story-row { gap: 16px; padding: 24px 0; }
      .story-row-date { display: none; }
      .post-title { font-size: clamp(1.5rem, 6vw, 2rem); }
    }
  </style>
</head>

<body class="has-sidebar">

  <script src="lib/nav.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="lib/supabase.js"></script>
  <script src="lib/sync.js"></script>
  <script src="data/story-starters.js"></script>
  <script src="lib/toast.js"></script>
  <script src="lib/confirm-delete.js"></script>
  <script src="lib/library.js"></script>
  <div class="toast" id="toast"></div>

  <main>

  <!-- ── LIST VIEW ── -->
  <div id="list-view">
    <section class="hero">
      <div class="inner">
        <p class="label-1">Your library.</p>
        <h3>Your Stories</h3>
        <p>Every story you&#8217;ve saved, ready to return to. Read one before class. Refine them as they grow with you.</p>
      </div>
    </section>

    <div class="wrap">
      <div class="library-bar" id="library-bar">
        <div class="search-wrap">
          <span class="search-icon"><span class="material-symbols-sharp">search</span></span>
          <input type="search" class="search-input" id="stories-search" placeholder="Search your stories&#8230;">
        </div>
        <a href="story-starters" class="btn-icon" title="Find a starter" data-tooltip="Find a starter">
          <span class="material-symbols-sharp">auto_stories</span>
        </a>
        <button class="btn-primary" id="new-story-btn">
          <span class="material-symbols-sharp i-lg">add</span>
          New Story
        </button>
      </div>
      <div class="sort-row" id="sort-row">
        <button class="btn-ghost sm" id="sort-btn" title="Toggle sort order" data-tooltip="Sort by">
          <span class="material-symbols-sharp i-sm" style="margin-right:5px">swap_vert</span>
          <span id="sort-label">Recently Edited</span>
        </button>
        <button class="btn-ghost sm fav-filter" id="fav-filter-btn" title="Only favorites" data-tooltip="Only favorites">
          <span class="material-symbols-sharp i-sm" style="margin-right:5px">favorite</span>
          Favorites
        </button>
        <span class="result-count" id="result-count"></span>
      </div>
      <div class="story-index" id="story-index"></div>
    </div>
  </div>

  <!-- ── DETAIL VIEW ── -->
  <div id="detail-view" hidden>
    <div class="post-bar">
      <button class="btn-ghost" id="back-btn">
      <span class="material-symbols-sharp i-md" style="margin-right:6px">arrow_back</span>
      <span class="post-back-label">Your Stories</span>
      </button>
      <div class="post-edit-actions" id="post-edit-actions" hidden>
      <button class="btn-ghost" id="cancel-edit-btn">Cancel</button>
      <button class="btn-primary" id="save-edit-btn">Save Changes</button>
      </div>
    </div>
    <div class="wrap" style="padding-top: 0;">

      <article class="post">
        <div class="post-head">
          <div class="post-head-main">
            <h4 class="post-title" id="post-title"></h4>
            <p class="post-starter-line" id="post-starter-line" hidden></p>
            <p class="post-meta" id="post-meta" hidden></p>
          </div>
          <div class="post-actions" id="post-actions">
            <button class="btn-icon" id="edit-btn" title="Edit story" data-tooltip="Edit">
              <span class="material-symbols-sharp">edit</span>
            </button>
            <button class="btn-icon" id="story-more-btn" title="More actions" data-tooltip="More">
              <span class="material-symbols-sharp">more_horiz</span>
            </button>
            <div class="st-menu" id="st-menu" hidden></div>
          </div>
        </div>

        <div class="post-body" id="post-body"></div>

        <div id="post-edit" hidden>
          <input type="text" class="post-title-input" id="post-title-input" placeholder="Title your story&#8230;" maxlength="120" autocomplete="off">
          <textarea class="post-edit-area" id="post-edit-area" placeholder="Write it like you&#8217;d tell it in class&#8230;"></textarea>
        </div>
      </article>

    </div>
  </div>

  <div class="modal-backdrop" id="discard-modal" hidden>
    <div class="modal-card">
      <h3>Discard changes?</h3>
      <p class="modal-hint">Your edits haven&#8217;t been saved.</p>
      <div class="modal-actions">
        <button class="btn-ghost" id="discard-keep">Keep Editing</button>
        <button class="btn-primary" id="discard-yes">Discard</button>
      </div>
    </div>
  </div>

  </main>

  <script>
    // ─── DATA ────────────────────────────────────────────────────────────────────

    var KEY = 'flowschool_stories';

    function loadStories() {
      try { return JSON.parse(localStorage.getItem(KEY) || '[]'); } catch (_) { return []; }
    }

    function persist(stories) {
      localStorage.setItem(KEY, JSON.stringify(stories));
    }

    var stories = loadStories();
    var currentId = null;
    var editing = false;
    var composing = false;
    var composeStarter = null;

    // ─── HELPERS ─────────────────────────────────────────────────────────────────



    // ─── SORT — per-category preference, edited-first by default ─────────────────
    var SORT_KEY = 'fs-sort-stories';
    function sortMode() { return fsSortMode(SORT_KEY); }
    var sorterFor = fsSorterFor;
    function renderSortBtn() { fsRenderSortLabel(sortMode()); }

    // ─── DATE STAMPS — Created ↔ Edited, apple-notes style ──────────────────────
    // Clicking a stamp flips the mode; the choice persists site-wide.
    var dateMode = fsDateMode, toggleDateMode = fsToggleDateMode, stampFor = fsStampFor;

    var fmtDate = fsFmtDate, esc = fsEsc;

    function firstLine(text) {
      var line = (text || '').split('\n')[0].trim();
      return line.length > 110 ? line.slice(0, 107) + '…' : line;
    }

    // ─── LIST VIEW ───────────────────────────────────────────────────────────────

    function renderList(filter) {
      var index = document.getElementById('story-index');
      var bar = document.getElementById('library-bar');
      var q = (filter || '').trim().toLowerCase();

      if (!stories.length) {
        bar.hidden = true;
        document.getElementById('sort-row').hidden = true;
        index.innerHTML =
          '<div class="library-empty">' +
          '<h4 class="library-empty-title">The stories only you can tell.</h4>' +
          '<p class="library-empty-sub">They&#8217;ll live here &#8212; ready to open a class with. Draw a starter for inspiration, or begin with a blank page.</p>' +
          '<div class="library-empty-actions">' +
          '<button class="btn-primary" id="empty-new-btn">Write a Story</button>' +
          '</div>' +
          '<a href="story-starters" class="library-empty-link">Get Inspired <span class="material-symbols-sharp i-sm" style="vertical-align:-2px">arrow_forward</span></a>' +
          fsGhostRows() +
          '</div>';
        document.getElementById('empty-new-btn').addEventListener('click', function () {
          showCompose(null, true);
        });
        return;
      }

      bar.hidden = false;
      document.getElementById('sort-row').hidden = false;
      renderSortBtn();
      var list = stories.slice().sort(sorterFor(sortMode()));
      if (favOnly) list = list.filter(function (x) { return x.pinned; });
      if (q) {
        list = list.filter(function (s) {
          return (s.text || '').toLowerCase().indexOf(q) !== -1
              || (s.title || '').toLowerCase().indexOf(q) !== -1
              || (s.starter || '').toLowerCase().indexOf(q) !== -1;
        });
      }

      if (!list.length) {
        document.getElementById('result-count').textContent = '0 results';
        index.innerHTML = '<div class="library-empty"><p class="library-empty-sub">' +
          (q ? 'Nothing matches &#8220;' + esc(filter) + '&#8221;.'
             : 'No favorites yet &#8212; use the &#8943; menu on a story.') +
          '</p></div>';
        return;
      }

      document.getElementById('result-count').textContent =
        list.length + ' result' + (list.length !== 1 ? 's' : '');

      index.innerHTML = list.map(function (s) {
        return '<a href="stories?id=' + s.id + '" class="story-row" data-id="' + s.id + '">' +
          '<span class="story-row-main">' +
            '<span class="story-row-title">' + esc(s.title || firstLine(s.text)) +
              (s.pinned ? '<span class="material-symbols-sharp fav-mark">favorite</span>' : '') +
            '</span>' +
            (s.starter ? '<span class="story-row-meta">' + esc(s.starter) + '</span>' : '') +
          '</span>' +
          '<span class="story-row-date">' + fmtDate(stampFor(s).ts) + '</span>' +
        '</a>';
      }).join('');
    }

    // ─── DETAIL VIEW ─────────────────────────────────────────────────────────────

    function renderDetail(id) {
      var s = stories.find(function (x) { return x.id === id; });
      if (!s) { showList(); return; }

      currentId = id;
      composing = false;
      composeStarter = null;
      document.getElementById('post-meta').hidden = false;
      document.getElementById('save-edit-btn').textContent = 'Save Changes';
      renderTitleWithFav(s);
      var sl = document.getElementById('post-starter-line');
      sl.hidden = !s.starter;
      sl.textContent = s.starter || '';
      document.getElementById('post-body').innerHTML = (s.text || '')
        .split(/\n+/)
        .filter(function (p) { return p.trim(); })
        .map(function (p) { return '<p>' + esc(p) + '</p>'; })
        .join('');
      renderPostMeta(s);
      setEditing(false);
    }

    function renderTitleWithFav(s) {
      var el = document.getElementById('post-title');
      el.hidden = !s.title;
      el.innerHTML = esc(s.title || '') +
        (s.pinned && s.title ? '<span class="material-symbols-sharp fav-mark lg">favorite</span>' : '');
    }

    function renderPostMeta(s) {
      var st = stampFor(s);
      document.getElementById('post-meta').innerHTML =
        '<span class="date-toggle" title="Show ' + (dateMode() === 'edited' ? 'created' : 'edited') + ' date">' +
        st.label + ' ' + fmtDate(st.ts) + '</span>';
    }

    function setEditing(on) {
      editing = on;
      document.getElementById('post-body').hidden = on;
      document.getElementById('post-edit').hidden = !on;
      document.getElementById('post-actions').hidden = on;
      document.getElementById('post-edit-actions').hidden = !on;
      document.getElementById('post-title').hidden = on || !currentTitle();
      if (on && !composing) {
        var s = stories.find(function (x) { return x.id === currentId; });
        var area = document.getElementById('post-edit-area');
        area.value = s ? s.text : '';
        document.getElementById('post-title-input').value = s ? (s.title || '') : '';
        editBaseline = baselineNow();
        updateSaveEnabled();
        autoGrow();
        area.focus();
      }
    }

    function currentTitle() {
      var s = stories.find(function (x) { return x.id === currentId; });
      return s ? (s.title || '') : '';
    }

    // ─── COMPOSE (new story from a drawn starter) ────────────────────────────────

    function showCompose(starterId, push) {
      var st = starterId != null
        ? (window.STORY_STARTERS || []).find(function (x) { return x.id === starterId; })
        : null;
      if (starterId != null && !st) { showList(); return; }
      composing = true;
      composeStarter = st;
      currentId = null;
      document.getElementById('list-view').hidden = true;
      document.getElementById('detail-view').hidden = false;
      document.getElementById('post-title').hidden = true;
      var csl = document.getElementById('post-starter-line');
      csl.hidden = !st;
      csl.textContent = st ? st.text : '';
      document.getElementById('post-body').innerHTML = '';
      document.getElementById('post-meta').hidden = true;
      document.getElementById('save-edit-btn').textContent = 'Save to Your Library';
      setEditing(true);
      var area = document.getElementById('post-edit-area');
      area.value = '';
      document.getElementById('post-title-input').value = '';
      editBaseline = baselineNow();
      updateSaveEnabled();
      autoGrow();
      document.getElementById('post-title-input').focus();
      if (push) history.pushState({}, '', st ? 'stories?new=' + starterId : 'stories?new=blank');
      window.scrollTo(0, 0);
    }

    // ─── VIEW SWITCHING ──────────────────────────────────────────────────────────

    function showList(push) {
      document.getElementById('detail-view').hidden = true;
      document.getElementById('list-view').hidden = false;
      currentId = null;
      composing = false;
      composeStarter = null;
      renderList(document.getElementById('stories-search').value);
      if (push) history.pushState({}, '', 'stories');
      window.scrollTo(0, 0);
    }

    function showDetail(id, push) {
      document.getElementById('list-view').hidden = true;
      document.getElementById('detail-view').hidden = false;
      renderDetail(id);
      if (push) history.pushState({}, '', 'stories?id=' + id);
      window.scrollTo(0, 0);
    }

    function route() {
      var params = new URLSearchParams(window.location.search);
      var nid = params.get('new');
      if (nid) { showCompose(nid === 'blank' ? null : parseInt(nid)); return; }
      var eid = params.get('edit');
      if (eid && stories.some(function (s) { return String(s.id) === eid; })) {
        showDetail(parseInt(eid));
        setEditing(true);
        return;
      }
      var id = params.get('id');
      if (id && stories.some(function (s) { return String(s.id) === id; })) {
        showDetail(parseInt(id));
      } else {
        showList();
      }
    }

    window.addEventListener('popstate', function () {
      if (isStoryDirty()) {
        confirmDiscard(function (yes) {
          if (yes) { editing = false; composing = false; route(); }
          else {
            history.pushState({}, '', composing
              ? 'stories?new=' + (composeStarter ? composeStarter.id : 'blank')
              : 'stories?edit=' + currentId);
          }
        });
      } else {
        route();
      }
    });

    // ─── EVENTS ──────────────────────────────────────────────────────────────────

    var editArea = document.getElementById('post-edit-area');
    function autoGrow() { fsAutoGrow(editArea); }

    // save enables only when title or text differs from what's stored
    var editBaseline = '';
    function baselineNow() {
      return document.getElementById('post-title-input').value.trim() + '\u0000' + editArea.value.trim();
    }
    function updateSaveEnabled() {
      document.getElementById('save-edit-btn').disabled = baselineNow() === editBaseline;
    }

    editArea.addEventListener('input', function () {
      autoGrow();
      updateSaveEnabled();
    });

    document.getElementById('post-title-input').addEventListener('input', updateSaveEnabled);

    document.getElementById('stories-search').addEventListener('input', function (e) {
      renderList(e.target.value);
    });

    var favOnly = false;
    document.getElementById('fav-filter-btn').addEventListener('click', function () {
      favOnly = !favOnly;
      this.classList.toggle('on', favOnly);
      renderList(document.getElementById('stories-search').value);
    });

    document.getElementById('sort-btn').addEventListener('click', function () {
      localStorage.setItem(SORT_KEY, sortMode() === 'edited' ? 'created' : 'edited');
      renderList(document.getElementById('stories-search').value);
    });

    document.getElementById('new-story-btn').addEventListener('click', function () {
      showCompose(null, true);
    });

    // intercept row clicks for instant in-page navigation
    document.getElementById('story-index').addEventListener('click', function (e) {
      var row = e.target.closest('.story-row');
      if (!row) return;
      e.preventDefault();
      showDetail(parseInt(row.dataset.id), true);
    });

    // ─── UNSAVED-CHANGES GUARD ───────────────────────────────────────────────────

    function isStoryDirty() {
      return (editing || composing) && baselineNow() !== editBaseline;
    }

    var confirmDiscard = fsWireDiscardModal();

    window.addEventListener('beforeunload', function (e) {
      if (isStoryDirty()) { e.preventDefault(); e.returnValue = ''; }
    });

    function stopEditing(push) {
      editing = false;
      composing = false;
      setEditing(false);
      if (push) history.pushState({}, '', 'stories?id=' + currentId);
    }

    document.getElementById('back-btn').addEventListener('click', function () {
      if (isStoryDirty()) {
        confirmDiscard(function (yes) { if (yes) { editing = false; composing = false; showList(true); } });
      } else {
        showList(true);
      }
    });

    document.getElementById('edit-btn').addEventListener('click', function () {
      setEditing(true);
      history.pushState({}, '', 'stories?edit=' + currentId);
    });

    document.getElementById('cancel-edit-btn').addEventListener('click', function () {
      function leave() {
        if (composing) { composing = false; editing = false; showList(true); }
        else { stopEditing(true); }
      }
      if (isStoryDirty()) { confirmDiscard(function (yes) { if (yes) leave(); }); }
      else { leave(); }
    });

    document.getElementById('save-edit-btn').addEventListener('click', function () {
      var text = document.getElementById('post-edit-area').value.trim();
      if (!text) { toast('A story needs at least a line.'); return; }
      if (composing) {
        var entry = {
          id: Date.now(),
          starterId: composeStarter ? composeStarter.id : null,
          starter: composeStarter ? composeStarter.text : '',
          title: document.getElementById('post-title-input').value.trim(),
          text: text,
        };
        stories.push(entry);
        persist(stories);
        history.replaceState({}, '', 'stories?id=' + entry.id);
        renderDetail(entry.id);
        toast('Story saved.');
        return;
      }
      var s = stories.find(function (x) { return x.id === currentId; });
      if (!s) return;
      s.text = text;
      s.title = document.getElementById('post-title-input').value.trim();
      s.editedAt = Date.now();
      persist(stories);
      renderDetail(currentId);
      history.replaceState({}, '', 'stories?id=' + currentId);
      toast('Story updated.');
    });

    document.getElementById('post-meta').addEventListener('click', function (e) {
      if (!e.target.closest('.date-toggle')) return;
      toggleDateMode();
      var s = stories.find(function (x) { return x.id === currentId; });
      if (s) renderPostMeta(s);
    });

    // ─── ACTIONS MENU — favorite / duplicate / delete ────────────────────────────

    var menu = fsWireItemMenu(document.getElementById('st-menu'), {
      items: function () {
        var src = stories.find(function (x) { return x.id === currentId; }) || {};
        return [
          { act: 'pin', icon: 'favorite',
            iconClass: src.pinned ? 'fav-mark' : '',
            iconStyle: src.pinned ? 'margin:0;vertical-align:0;font-size:16px' : '',
            label: src.pinned ? 'Remove from favorites' : 'Add to favorites' },
          { act: 'dup', icon: 'content_copy', label: 'Duplicate' },
          { act: 'del', icon: 'delete', label: 'Delete story' },
        ];
      },
      confirm: { del: 'Click again to delete' },
      on: function (act) {
        var src = stories.find(function (x) { return x.id === currentId; });
        if (!src) return;
        if (act === 'pin') {
          src.pinned = !src.pinned;
          persist(stories);
          renderTitleWithFav(src);
          toast(src.pinned ? 'Added to your favorites.' : 'Removed from favorites.');
        } else if (act === 'dup') {
          // opens unsaved — nothing exists until they save the retelling
          showCompose(null, true);
          composeStarter = src.starter ? { id: src.starterId || null, text: src.starter } : null;
          var csl = document.getElementById('post-starter-line');
          csl.hidden = !src.starter;
          csl.textContent = src.starter || '';
          document.getElementById('post-title-input').value = (src.title || 'Untitled Story') + ' \u2014 copy';
          var area = document.getElementById('post-edit-area');
          area.value = src.text || '';
          editBaseline = '\u0000never';
          updateSaveEnabled();
          autoGrow();
          toast('Copy ready \u2014 make it yours.');
        } else if (act === 'del') {
          stories = stories.filter(function (x) { return x.id !== currentId; });
          persist(stories);
          toast('Story removed.');
          showList(true);
        }
      },
    });

    document.getElementById('story-more-btn').addEventListener('click', function (e) {
      e.stopPropagation();
      menu.toggle();
    });

    // ─── INIT ────────────────────────────────────────────────────────────────────

    route();
  </script>
  <script src="lib/tracker.js"></script>
</body>

</html>
