<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <script>!function(){var t=localStorage.getItem("fs-theme");document.documentElement.setAttribute("data-theme",t||"dark")}()</script>
  <style>html{background:#1B1B1B;color-scheme:dark}html[data-theme="light"]{background:#F5F4F0;color-scheme:light}</style>
  <link rel="icon" href="img/flow-school-favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Stories — Flow School</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Sharp:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
  <link rel="stylesheet" href="global.css">
  <style>
    /* ── Library bar — search + actions ── */
    .library-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .library-bar[hidden] { display: none; }

    .library-bar .search-wrap { flex: 1; }

    @media (max-width: 580px) {
      .library-bar { flex-wrap: wrap; }
      .library-bar .search-wrap { flex-basis: 100%; }
    }

    /* ── Story index — typography first ── */
    .story-index { margin-top: 24px; }

    .story-row {
      display: flex;
      align-items: baseline;
      gap: 20px;
      padding: 26px 0;
      border-bottom: 1px solid var(--border-light);
      text-decoration: none;
      color: inherit;
    }

    .story-row:last-child { border-bottom: none; }

    .story-row-main { flex: 1; min-width: 0; }

    .story-row-title {
      font-size: var(--fs-h5);
      font-weight: var(--weight-regular);
      letter-spacing: -.01em;
      line-height: var(--lh-heading);
      color: var(--text-1);
      margin-bottom: 6px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      transition: opacity var(--transition-base);
    }

    .story-row:hover .story-row-title { opacity: .65; }

    .story-row-meta {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: .04em;
      color: var(--text-3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }

    .story-row-date {
      flex-shrink: 0;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-3);
      white-space: nowrap;
    }

    /* ── Empty state ── */
    .stories-empty {
      text-align: center;
      padding: 88px 28px;
    }

    .stories-empty p {
      color: var(--text-3);
      margin-bottom: 24px;
    }

    .stories-empty-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .stories-empty-actions .btn-primary { border-radius: var(--r-cta); }

    /* ── Detail view — reads like a post ── */
    /* The bar stays pinned while writing or reading long stories */
    .post-bar {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 0;
      margin-bottom: 26px;
      background: rgba(var(--paper-rgb), .88);
      backdrop-filter: var(--glass);
      -webkit-backdrop-filter: var(--glass);
    }

    .post-actions { display: flex; gap: 8px; }
    /* display:flex on these groups would defeat the hidden attribute */
    .post-actions [hidden],
    .post-actions[hidden],
    .post-edit-actions[hidden] { display: none; }

    @media (max-width: 768px) {
      /* stay below the floating sidebar toggle */
      .post-bar { top: 64px; }
    }

    .story-del-btn.confirm-delete-armed,
    .story-del-btn.confirm-delete-armed:hover {
      color: var(--danger);
      border-color: var(--danger);
      background: rgba(224, 82, 82, .10);
    }

    .post {
      max-width: 640px;
    }

    .post-kicker { margin-bottom: 14px; }

    .post-title {
      font-size: var(--fs-h4);
      font-weight: var(--weight-regular);
      letter-spacing: -.01em;
      line-height: var(--lh-heading);
      color: var(--text-1);
      margin-bottom: 28px;
    }

    .post-body p {
      font-size: var(--text-body-lg);
      line-height: 1.8;
      color: var(--text-1);
      margin-bottom: 1.2em;
    }

    .post-body p:last-child { margin-bottom: 0; }

    .post-meta {
      margin-top: 36px;
      padding-top: 20px;
      border-top: 1px solid var(--border-light);
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: .04em;
      color: var(--text-3);
    }

    /* ── Edit mode — a forever page, not a form field ──
       The textarea is invisible: same type as the finished post,
       auto-grows with the writing, the page itself scrolls. */
    .post-edit-area {
      width: 100%;
      min-height: 32vh;
      display: block;
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0;
      color: var(--text-1);
      font-family: var(--font);
      font-size: var(--text-body-lg);
      line-height: 1.8;
      outline: none;
      resize: none;
      overflow: hidden;
    }

    .post-edit-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .post-edit-actions .btn-primary { border-radius: var(--r-cta); }

    @media (max-width: 580px) {
      .story-row { gap: 14px; padding: 22px 0; }
      .story-row-date { display: none; }
      .post-title { font-size: clamp(1.5rem, 6vw, 2rem); }
    }
  </style>
</head>

<body class="has-sidebar">

  <script src="lib/nav.js"></script>
  <script src="data/story-starters.js"></script>
  <script src="lib/toast.js"></script>
  <script src="lib/confirm-delete.js"></script>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="toast" id="toast"></div>

  <main>

  <!-- ── LIST VIEW ── -->
  <div id="list-view">
    <section class="hero">
      <div class="inner">
        <p class="label-1">Your library.</p>
        <h3>Your Stories</h3>
        <p>Every story you&#8217;ve saved, ready to return to. Read one before class. Refine them as they grow with you.</p>
      </div>
    </section>

    <div class="wrap">
      <div class="library-bar" id="library-bar">
        <div class="search-wrap">
          <span class="search-icon"><span class="material-symbols-sharp">search</span></span>
          <input type="search" class="search-input" id="stories-search" placeholder="Search your stories&#8230;">
        </div>
        <button class="btn-icon" id="new-story-btn" title="New blank story" data-tooltip="New story">
          <span class="material-symbols-sharp">edit</span>
        </button>
        <a href="story-starters.html" class="btn-icon" title="Find a starter" data-tooltip="Find a starter">
          <span class="material-symbols-sharp">auto_stories</span>
        </a>
      </div>
      <div class="story-index" id="story-index"></div>
    </div>
  </div>

  <!-- ── DETAIL VIEW ── -->
  <div id="detail-view" hidden>
    <div class="wrap" style="padding-top: 56px;">

      <div class="post-bar">
        <button class="btn-ghost" id="back-btn">
          <span class="material-symbols-sharp" style="font-size:16px;margin-right:6px">arrow_back</span>
          Your Stories
        </button>
        <div class="post-actions" id="post-actions">
          <button class="btn-icon" id="edit-btn" title="Edit story" data-tooltip="Edit">
            <span class="material-symbols-sharp">edit</span>
          </button>
          <button class="btn-icon story-del-btn" id="delete-btn" title="Delete story" data-tooltip="Delete">
            <span class="material-symbols-sharp">delete</span>
          </button>
        </div>
        <div class="post-edit-actions" id="post-edit-actions" hidden>
          <button class="btn-ghost" id="cancel-edit-btn">Cancel</button>
          <button class="btn-primary" id="save-edit-btn">Save Changes</button>
        </div>
      </div>

      <article class="post">
        <p class="post-kicker label-1" id="post-kicker">Your Starter</p>
        <h4 class="post-title" id="post-title"></h4>

        <div class="post-body" id="post-body"></div>

        <div id="post-edit" hidden>
          <textarea class="post-edit-area" id="post-edit-area" placeholder="A few lines is enough. What happened? What did you learn? Where does it land on the mat?"></textarea>
        </div>

        <p class="post-meta" id="post-meta"></p>
      </article>

    </div>
  </div>

  </main>

  <script>
    // ─── DATA ────────────────────────────────────────────────────────────────────

    var KEY = 'flowschool_stories';

    function loadStories() {
      try { return JSON.parse(localStorage.getItem(KEY) || '[]'); } catch (_) { return []; }
    }

    function persist(stories) {
      localStorage.setItem(KEY, JSON.stringify(stories));
    }

    var stories = loadStories();
    var currentId = null;
    var editing = false;
    var composing = false;
    var composeStarter = null;

    // ─── HELPERS ─────────────────────────────────────────────────────────────────

    var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    function fmtDate(ts) {
      if (!ts) return '';
      var d = new Date(ts);
      return MONTHS[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
    }

    function esc(s) {
      var div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    function firstLine(text) {
      var line = (text || '').split('\n')[0].trim();
      return line.length > 110 ? line.slice(0, 107) + '…' : line;
    }

    // ─── LIST VIEW ───────────────────────────────────────────────────────────────

    function renderList(filter) {
      var index = document.getElementById('story-index');
      var bar = document.getElementById('library-bar');
      var q = (filter || '').trim().toLowerCase();

      if (!stories.length) {
        bar.hidden = true;
        index.innerHTML =
          '<div class="stories-empty">' +
          '<p>No stories yet. Draw a starter for inspiration, or begin with a blank page.</p>' +
          '<div class="stories-empty-actions">' +
          '<button class="btn-secondary" id="empty-new-btn">Start with a Blank Page</button>' +
          '<a href="story-starters.html" class="btn-primary">Find a Starter</a>' +
          '</div>' +
          '</div>';
        document.getElementById('empty-new-btn').addEventListener('click', function () {
          showCompose(null, true);
        });
        return;
      }

      bar.hidden = false;
      var list = stories.slice().sort(function (a, b) { return b.id - a.id; });
      if (q) {
        list = list.filter(function (s) {
          return (s.text || '').toLowerCase().indexOf(q) !== -1
              || (s.starter || '').toLowerCase().indexOf(q) !== -1;
        });
      }

      if (!list.length) {
        index.innerHTML = '<div class="stories-empty"><p>Nothing matches &#8220;' + esc(filter) + '&#8221;.</p></div>';
        return;
      }

      index.innerHTML = list.map(function (s) {
        return '<a href="stories.html?id=' + s.id + '" class="story-row" data-id="' + s.id + '">' +
          '<span class="story-row-main">' +
            '<span class="story-row-title">' + esc(firstLine(s.text)) + '</span>' +
            (s.starter ? '<span class="story-row-meta">' + esc(s.starter) + '</span>' : '') +
          '</span>' +
          '<span class="story-row-date">' + fmtDate(s.id) + '</span>' +
        '</a>';
      }).join('');
    }

    // ─── DETAIL VIEW ─────────────────────────────────────────────────────────────

    function renderDetail(id) {
      var s = stories.find(function (x) { return x.id === id; });
      if (!s) { showList(); return; }

      currentId = id;
      composing = false;
      composeStarter = null;
      document.getElementById('post-meta').hidden = false;
      document.getElementById('delete-btn').hidden = false;
      document.getElementById('save-edit-btn').textContent = 'Save Changes';
      document.getElementById('post-kicker').hidden = !s.starter;
      document.getElementById('post-title').hidden = !s.starter;
      document.getElementById('post-title').textContent = s.starter || '';
      document.getElementById('post-body').innerHTML = (s.text || '')
        .split(/\n+/)
        .filter(function (p) { return p.trim(); })
        .map(function (p) { return '<p>' + esc(p) + '</p>'; })
        .join('');
      var meta = 'Saved ' + fmtDate(s.id);
      if (s.editedAt) meta += ' &nbsp;&#183;&nbsp; Edited ' + fmtDate(s.editedAt);
      document.getElementById('post-meta').innerHTML = meta;
      setEditing(false);
    }

    function setEditing(on) {
      editing = on;
      document.getElementById('post-body').hidden = on;
      document.getElementById('post-edit').hidden = !on;
      document.getElementById('post-actions').hidden = on;
      document.getElementById('post-edit-actions').hidden = !on;
      if (on && !composing) {
        var s = stories.find(function (x) { return x.id === currentId; });
        var area = document.getElementById('post-edit-area');
        area.value = s ? s.text : '';
        autoGrow();
        area.focus();
      }
    }

    // ─── COMPOSE (new story from a drawn starter) ────────────────────────────────

    function showCompose(starterId, push) {
      var st = starterId != null
        ? (window.STORY_STARTERS || []).find(function (x) { return x.id === starterId; })
        : null;
      if (starterId != null && !st) { showList(); return; }
      composing = true;
      composeStarter = st;
      currentId = null;
      document.getElementById('list-view').hidden = true;
      document.getElementById('detail-view').hidden = false;
      document.getElementById('post-kicker').hidden = !st;
      document.getElementById('post-title').hidden = !st;
      document.getElementById('post-title').textContent = st ? st.text : '';
      document.getElementById('post-body').innerHTML = '';
      document.getElementById('post-meta').hidden = true;
      document.getElementById('save-edit-btn').textContent = 'Save to Your Library';
      setEditing(true);
      var area = document.getElementById('post-edit-area');
      area.value = '';
      autoGrow();
      area.focus();
      if (push) history.pushState({}, '', st ? 'stories.html?new=' + starterId : 'stories.html?new=blank');
      window.scrollTo(0, 0);
    }

    // ─── VIEW SWITCHING ──────────────────────────────────────────────────────────

    function showList(push) {
      document.getElementById('detail-view').hidden = true;
      document.getElementById('list-view').hidden = false;
      currentId = null;
      composing = false;
      composeStarter = null;
      renderList(document.getElementById('stories-search').value);
      if (push) history.pushState({}, '', 'stories.html');
      window.scrollTo(0, 0);
    }

    function showDetail(id, push) {
      document.getElementById('list-view').hidden = true;
      document.getElementById('detail-view').hidden = false;
      renderDetail(id);
      if (push) history.pushState({}, '', 'stories.html?id=' + id);
      window.scrollTo(0, 0);
    }

    function route() {
      var params = new URLSearchParams(window.location.search);
      var nid = params.get('new');
      if (nid) { showCompose(nid === 'blank' ? null : parseInt(nid)); return; }
      var id = params.get('id');
      if (id && stories.some(function (s) { return String(s.id) === id; })) {
        showDetail(parseInt(id));
      } else {
        showList();
      }
    }

    window.addEventListener('popstate', route);

    // ─── EVENTS ──────────────────────────────────────────────────────────────────

    var editArea = document.getElementById('post-edit-area');
    function autoGrow() {
      editArea.style.height = 'auto';
      editArea.style.height = editArea.scrollHeight + 'px';
    }
    editArea.addEventListener('input', autoGrow);

    document.getElementById('stories-search').addEventListener('input', function (e) {
      renderList(e.target.value);
    });

    document.getElementById('new-story-btn').addEventListener('click', function () {
      showCompose(null, true);
    });

    // intercept row clicks for instant in-page navigation
    document.getElementById('story-index').addEventListener('click', function (e) {
      var row = e.target.closest('.story-row');
      if (!row) return;
      e.preventDefault();
      showDetail(parseInt(row.dataset.id), true);
    });

    document.getElementById('back-btn').addEventListener('click', function () {
      showList(true);
    });

    document.getElementById('edit-btn').addEventListener('click', function () {
      setEditing(true);
    });

    document.getElementById('cancel-edit-btn').addEventListener('click', function () {
      if (composing) { showList(true); return; }
      setEditing(false);
    });

    document.getElementById('save-edit-btn').addEventListener('click', function () {
      var text = document.getElementById('post-edit-area').value.trim();
      if (!text) { toast('A story needs at least a line.'); return; }
      if (composing) {
        var entry = {
          id: Date.now(),
          starterId: composeStarter ? composeStarter.id : null,
          starter: composeStarter ? composeStarter.text : '',
          text: text,
        };
        stories.push(entry);
        persist(stories);
        history.replaceState({}, '', 'stories.html?id=' + entry.id);
        renderDetail(entry.id);
        toast('Story saved.');
        return;
      }
      var s = stories.find(function (x) { return x.id === currentId; });
      if (!s) return;
      s.text = text;
      s.editedAt = Date.now();
      persist(stories);
      renderDetail(currentId);
      toast('Story updated.');
    });

    wireConfirmDelete(document.getElementById('delete-btn'), function () {
      stories = stories.filter(function (x) { return x.id !== currentId; });
      persist(stories);
      toast('Story removed.');
      showList(true);
    });

    // ─── INIT ────────────────────────────────────────────────────────────────────

    route();
  </script>
  <script src="lib/tracker.js"></script>
</body>

</html>
