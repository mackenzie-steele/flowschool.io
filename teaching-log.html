<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <script>!function(){var t=localStorage.getItem("fs-theme");document.documentElement.setAttribute("data-theme",t||"dark")}()</script>
  <style>html{background:#151515;color-scheme:dark}html[data-theme="light"]{background:#F5F4F0;color-scheme:light}</style>
  <link rel="icon" href="img/flow-school-favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teaching Log — Flow School</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Sharp:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
  <link rel="stylesheet" href="global.css">
  <style>
    /* ── Library bar — search + add, the standard pattern ── */
    .library-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .library-bar .search-wrap { flex: 1; }

    .library-bar .btn-primary {
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: var(--r-cta);
      flex-shrink: 0;
    }

    @media (max-width: 640px) {
      .library-bar { flex-wrap: wrap; }
      .library-bar .search-wrap { flex-basis: 100%; }
    }

    /* ── Composer — a note needs a class and some honesty ── */
    .lg-composer {
      margin: 24px 0 8px;
      background: rgba(var(--ink-rgb), .025);
      box-shadow: inset 0 0 0 1px rgba(var(--ink-rgb), .09);
      border-radius: var(--r);
      padding: 16px;
    }

    .lg-class-row {
      position: relative;
      margin-bottom: 16px;
    }

    .lg-class-pick {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(var(--ink-rgb), .04);
      box-shadow: inset 0 0 0 1px rgba(var(--ink-rgb), .12);
      border: none;
      border-radius: var(--r);
      padding: 8px 12px;
      cursor: pointer;
      color: var(--text-2);
      font-family: var(--font);
      font-size: var(--text-ui);
      transition: box-shadow var(--transition-base), color var(--transition-base);
    }

    .lg-class-pick:hover { color: var(--text-1); }
    .lg-class-pick.chosen { color: var(--text-1); }
    .lg-class-pick .material-symbols-sharp { font-size: var(--icon-sm); color: var(--text-3); }

    .lg-class-menu {
      position: absolute;
      z-index: 5;
      top: calc(100% + 6px);
      left: 0;
      min-width: 260px;
      max-height: 260px;
      overflow-y: auto;
      background: var(--paper-solid);
      border: 1px solid rgba(var(--ink-rgb), .16);
      border-top-color: rgba(var(--ink-rgb), .30);
      box-shadow: var(--shadow-float);
    }

    .lg-class-row-item {
      display: block;
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      cursor: pointer;
      padding: 12px 16px;
      color: var(--text-2);
      font-family: var(--font);
      font-size: var(--text-ui);
      transition: background var(--transition-fast), color var(--transition-fast);
    }

    .lg-class-row-item:hover { background: rgba(var(--ink-rgb), .05); color: var(--text-1); }

    .lg-area {
      width: 100%;
      min-height: 84px;
      display: block;
      background: rgba(var(--ink-rgb), .04);
      box-shadow: inset 0 0 0 1px rgba(var(--ink-rgb), .12);
      border: none;
      border-radius: var(--r);
      padding: 16px 16px;
      color: var(--text-1);
      font-family: var(--font);
      font-size: var(--fs-body);
      line-height: 1.7;
      outline: none;
      resize: none;
      overflow: hidden;
      transition: box-shadow var(--transition-base), background var(--transition-base);
    }

    .lg-area:focus {
      background: rgba(var(--ink-rgb), .06);
      box-shadow: inset 0 0 0 1px rgba(var(--ink-rgb), .30);
    }

    .lg-area::placeholder { color: var(--text-3); font-style: italic; }

    .lg-composer-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 12px;
    }

    /* ── The log — one dated entry per note, newest first ── */
    .lg-stream { margin-top: 16px; }

    .lg-entry {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 16px 0;
      border-top: 1px solid var(--border-light);
    }

    .lg-entry-main { flex: 1; min-width: 0; }

    .lg-entry-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .lg-entry-date {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-3);
    }

    .lg-class-tag { text-decoration: none; transition: border-color var(--transition-base), color var(--transition-base); }
    .lg-class-tag:hover { color: var(--text-1); border-color: rgba(var(--ink-rgb), .40); }

    .lg-entry-text {
      font-size: var(--text-body-sm);
      color: var(--text-2);
      line-height: 1.6;
      white-space: pre-wrap;
      overflow-wrap: break-word;
    }

    .lg-entry-del {
      flex-shrink: 0;
      background: none;
      border: none;
      color: var(--text-3);
      cursor: pointer;
      padding: 2px 8px;
      font-size: 13px;
      line-height: 1;
      transition: color var(--transition-base);
    }

    .lg-entry-del:hover { color: var(--danger); }

    .lg-entry-del.confirm-delete-armed,
    .lg-entry-del.confirm-delete-armed:hover { color: var(--danger); }
  </style>
</head>

<body class="has-sidebar">
  <main>
    <section class="hero">
      <div class="inner">
        <p class="label-1">Same class. Better.</p>
        <h3>Teaching Log</h3>
        <p>After you teach, write down what worked and what you&#8217;d change. Do it after enough classes and you&#8217;ve got a record of how you&#8217;re actually getting better &#8212; which is easy to lose track of when you&#8217;re in the middle of it.</p>
      </div>
    </section>

    <div class="wrap">

      <div class="library-bar" id="library-bar">
        <div class="search-wrap">
          <span class="search-icon"><span class="material-symbols-sharp">search</span></span>
          <input type="text" class="search-input" id="log-search" placeholder="Search your notes&#8230;" autocomplete="off">
        </div>
        <button class="btn-primary" id="add-note-btn">
          <span class="material-symbols-sharp i-lg">add</span>
          Add a Note
        </button>
      </div>

      <div class="lg-composer" id="lg-composer" hidden>
        <div class="lg-class-row" id="lg-class-row">
          <button type="button" class="lg-class-pick" id="lg-class-pick">
            <span class="material-symbols-sharp">import_contacts</span>
            <span id="lg-class-pick-label">Select a class</span>
          </button>
          <div class="lg-class-menu" id="lg-class-menu" hidden></div>
        </div>
        <textarea class="lg-area" id="lg-area" placeholder="What worked? What would you change?"></textarea>
        <div class="lg-composer-actions">
          <button class="btn-ghost sm" id="lg-cancel">Cancel</button>
          <button class="btn-primary sm" id="lg-save">Save Note</button>
        </div>
      </div>

      <div class="sort-row" id="sort-row" hidden>
        <span class="result-count" id="result-count"></span>
      </div>

      <div class="lg-stream" id="lg-stream"></div>

    </div>
  </main>

  <script src="lib/version.js"></script>
  <script src="lib/nav.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="lib/supabase.js"></script>
  <script src="lib/telemetry.js"></script>
  <script src="lib/sync.js"></script>
  <script src="lib/motion.js"></script>
  <script src="lib/library.js"></script>
  <script src="lib/toast.js"></script>
  <script src="lib/confirm-delete.js"></script>
  <script>

    var KEY = 'flowschool_classes';
    var LOG_KEY = 'flowschool_lognotes';   // notes not tied to any class
    var classes = loadClasses();
    var logNotes = loadLog();

    // one load, one persist — the sync seam, same as every library
    function loadClasses() {
      try { return JSON.parse(localStorage.getItem(KEY) || '[]'); } catch (_) { return []; }
    }

    function persist() { localStorage.setItem(KEY, JSON.stringify(classes)); }

    function loadLog() {
      try { return JSON.parse(localStorage.getItem(LOG_KEY) || '[]'); } catch (_) { return []; }
    }

    function persistLog() { localStorage.setItem(LOG_KEY, JSON.stringify(logNotes)); }

    var esc = fsEsc, fmtDate = fsFmtDate;

    function allEntries() {
      var out = [];
      classes.forEach(function (c) {
        (c.notesLog || []).forEach(function (n) {
          out.push({ ts: n.ts, text: n.text, classId: c.id, className: c.title || 'Untitled Class' });
        });
      });
      logNotes.forEach(function (n) {
        out.push({ ts: n.ts, text: n.text, classId: null, className: null });
      });
      out.sort(function (a, b) { return b.ts - a.ts; });
      return out;
    }

    function render() {
      var q = document.getElementById('log-search').value.trim().toLowerCase();
      var entries = allEntries();
      var filtered = q
        ? entries.filter(function (e) {
            return e.text.toLowerCase().indexOf(q) !== -1 || e.className.toLowerCase().indexOf(q) !== -1;
          })
        : entries;

      var stream = document.getElementById('lg-stream');
      var hadGhosts = !!stream.querySelector('.library-empty-ghost');
      var sortRow = document.getElementById('sort-row');

      if (!entries.length) {
        sortRow.hidden = true;
        stream.innerHTML = '<div class="library-empty">' +
          fsGhostRows() +
          '<p class="library-empty-headline">The notes start after you teach.</p>' +
          '<p class="library-empty-sub">Add a note from any class &#8212; or right here &#8212; and your teaching history starts writing itself.</p>' +
          '</div>';
        return;
      }

      sortRow.hidden = false;
      document.getElementById('result-count').textContent =
        filtered.length + (filtered.length === 1 ? ' note' : ' notes');

      if (!filtered.length) {
        stream.innerHTML = '<div class="library-empty"><p class="library-empty-sub">Nothing matches &#8220;' + esc(q) + '&#8221;.</p></div>';
        return;
      }

      stream.innerHTML = filtered.map(function (e) {
        var tag = e.classId
          ? '<a class="lg-class-tag" href="your-classes?id=' + e.classId + '">' + esc(e.className) + '</a>'
          : '';
        return '<div class="lg-entry">' +
          '<div class="lg-entry-main">' +
            '<div class="lg-entry-head">' +
              '<span class="lg-entry-date">' + fmtDate(e.ts) + '</span>' +
              tag +
            '</div>' +
            '<div class="lg-entry-text">' + esc(e.text) + '</div>' +
          '</div>' +
          '<button class="lg-entry-del" data-cid="' + (e.classId != null ? e.classId : '') + '" data-ts="' + e.ts + '" title="Delete note"><span class="material-symbols-sharp i-sm">close</span></button>' +
        '</div>';
      }).join('');

      stream.querySelectorAll('.lg-entry-del').forEach(function (btn) {
        wireConfirmDelete(btn, function () {
          var ts = parseInt(btn.dataset.ts, 10);
          if (btn.dataset.cid === '') {
            // a class-less note lives in its own store
            logNotes = logNotes.filter(function (n) { return n.ts !== ts; });
            persistLog();
          } else {
            var c = classes.find(function (x) { return x.id === parseInt(btn.dataset.cid, 10); });
            if (!c) return;
            c.notesLog = (c.notesLog || []).filter(function (n) { return n.ts !== ts; });
            persist();
          }
          toast('Note removed.');
          render();
        });
      });
      fsGhostSettle(stream, hadGhosts);
    }

    // ─── COMPOSER — a note belongs to a class ────────────────────────

    var composeClassId = null;

    function openComposer() {
      composeClassId = null;
      // attaching a class is optional; hide the picker entirely when there
      // are no classes to attach to
      document.getElementById('lg-class-row').hidden = !classes.length;
      document.getElementById('lg-class-pick-label').textContent = 'Attach to a class (optional)';
      document.getElementById('lg-class-pick').classList.remove('chosen');
      document.getElementById('lg-area').value = '';
      fsUnfold(document.getElementById('lg-composer'), true);
      document.getElementById('add-note-btn').disabled = true;
      renderClassMenu();
      document.getElementById('lg-area').focus();
    }

    function closeComposer() {
      fsUnfold(document.getElementById('lg-composer'), false);
      document.getElementById('lg-class-menu').hidden = true;
      document.getElementById('add-note-btn').disabled = false;
    }

    function renderClassMenu() {
      var menu = document.getElementById('lg-class-menu');
      var list = classes.slice().sort(fsSorterFor('edited'));
      // a "No class" option at the top lets you detach after choosing
      var none = '<button type="button" class="lg-class-row-item" data-id="">No class</button>';
      menu.innerHTML = none + list.map(function (c) {
        return '<button type="button" class="lg-class-row-item" data-id="' + c.id + '">' + esc(c.title || 'Untitled Class') + '</button>';
      }).join('');
    }

    document.getElementById('add-note-btn').addEventListener('click', function (e) {
      e.stopPropagation(); // the opening click must not bubble into the close-on-outside listener
      openComposer();
    });

    document.getElementById('lg-cancel').addEventListener('click', closeComposer);

    document.getElementById('lg-class-pick').addEventListener('click', function (e) {
      e.stopPropagation();
      var menu = document.getElementById('lg-class-menu');
      if (menu.hidden) renderClassMenu();
      menu.hidden = !menu.hidden;
    });

    document.getElementById('lg-class-menu').addEventListener('click', function (e) {
      var item = e.target.closest('.lg-class-row-item');
      if (!item) return;
      e.stopPropagation();
      if (item.dataset.id === '') {
        composeClassId = null;
        document.getElementById('lg-class-pick-label').textContent = 'No class';
        document.getElementById('lg-class-pick').classList.add('chosen');
      } else {
        composeClassId = parseInt(item.dataset.id, 10);
        document.getElementById('lg-class-pick-label').textContent = item.textContent;
        document.getElementById('lg-class-pick').classList.add('chosen');
      }
      document.getElementById('lg-class-menu').hidden = true;
      document.getElementById('lg-area').focus();
    });

    document.addEventListener('click', function () {
      var menu = document.getElementById('lg-class-menu');
      if (!menu.hidden) menu.hidden = true;
    });

    document.getElementById('lg-area').addEventListener('input', function () { fsAutoGrow(this); });

    document.getElementById('lg-save').addEventListener('click', function () {
      var text = document.getElementById('lg-area').value.trim();
      if (!text) { toast('Write the note first.'); document.getElementById('lg-area').focus(); return; }
      if (composeClassId) {
        var c = classes.find(function (x) { return x.id === composeClassId; });
        if (!c) return;
        if (!c.notesLog) c.notesLog = [];
        c.notesLog.unshift({ ts: Date.now(), text: text });
        persist();
      } else {
        // a class-less note — saves to its own store, shows in the stream
        logNotes.unshift({ ts: Date.now(), text: text });
        persistLog();
      }
      closeComposer();
      toast('Noted.');
      render();
    });

    var searchT; // the list changes at typing pauses, not per keystroke
    document.getElementById('log-search').addEventListener('input', function () {
      clearTimeout(searchT);
      searchT = setTimeout(render, 140);
    });

    render();
  </script>
  <script src="lib/tracker.js"></script>

  <div class="toast" id="toast"></div>
</body>

</html>
