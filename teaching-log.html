<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <script>!function(){var t=localStorage.getItem("fs-theme");document.documentElement.setAttribute("data-theme",t||"dark")}()</script>
  <style>html{background:#14161B;color-scheme:dark}html[data-theme="light"]{background:#F7F6F4;color-scheme:light}</style>
  <link rel="icon" href="img/flow-school-favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teaching Log — Flow School</title>
  <link rel="stylesheet" href="global.css">
  <script src="lib/icons.js"></script>
  <style>
    /* ── Library bar — search + add, the standard pattern ── */
    .library-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .library-bar .search-wrap { flex: 1; }

    .filter-row .filter-chip { flex-shrink: 0; }

    @media (max-width: 620px) {
      .result-count { display: none; }
    }

    .library-bar .btn-primary {
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: var(--r-cta);
      flex-shrink: 0;
    }

    @media (max-width: 640px) {
      .library-bar { flex-wrap: wrap; }
      .library-bar .search-wrap { flex-basis: 100%; }
    }

    /* ── Composer — a note needs a class and some honesty ── */
    .lg-composer {
      margin: 24px 0 8px;
      background: var(--raised), rgba(var(--ink-rgb), .025);
      box-shadow: var(--crest), inset 0 0 0 1px rgba(var(--ink-rgb), .09);
      border-radius: var(--r);
      padding: 16px;
    }

    .lg-class-row {
      position: relative;
      margin-bottom: 16px;
    }

    .lg-class-pick {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--well-bg);
      box-shadow: var(--well), inset 0 0 0 1px rgba(var(--ink-rgb), .12);
      border: none;
      border-radius: var(--r);
      padding: 8px 12px;
      cursor: pointer;
      color: var(--text-2);
      font-family: var(--font);
      font-size: var(--text-ui);
      transition: box-shadow var(--transition-base), color var(--transition-base);
    }

    .lg-class-pick:hover { color: var(--text-1); }
    .lg-class-pick.chosen { color: var(--text-1); }
    .lg-class-pick .material-symbols-sharp { font-size: var(--icon-sm); color: var(--text-3); }

    .lg-class-menu {
      border-radius: var(--r); overflow: hidden;
      position: absolute;
      z-index: 5;
      top: calc(100% + 6px);
      left: 0;
      min-width: 260px;
      max-height: 260px;
      overflow-y: auto;
      background: var(--paper-solid);
      border: 1px solid rgba(var(--ink-rgb), .16);
      border-top-color: rgba(var(--ink-rgb), .30);
      box-shadow: var(--shadow-float);
    }

    .lg-class-row-item {
      display: block;
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      cursor: pointer;
      padding: 12px 16px;
      color: var(--text-2);
      font-family: var(--font);
      font-size: var(--text-ui);
      transition: background var(--transition-fast), color var(--transition-fast);
    }

    .lg-class-row-item:hover { background: rgba(var(--ink-rgb), .05); color: var(--text-1); }

    .lg-area {
      width: 100%;
      min-height: 84px;
      display: block;
      background: var(--well-bg);
      box-shadow: var(--well), inset 0 0 0 1px rgba(var(--ink-rgb), .12);
      border: none;
      border-radius: var(--r);
      padding: 16px 16px;
      color: var(--text-1);
      font-family: var(--font);
      font-size: var(--fs-body);
      line-height: 1.7;
      outline: none;
      resize: none;
      overflow: hidden;
      transition: box-shadow var(--transition-base), background var(--transition-base);
    }

    .lg-area:focus {
      background: rgba(var(--ink-rgb), .06);
      box-shadow: var(--well), inset 0 0 0 1px rgba(var(--ink-rgb), .30);
    }

    .lg-area::placeholder { color: var(--text-3); font-style: italic; }

    .lg-composer-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 12px;
    }

    /* ── The log — one dated entry per note, newest first ── */
    .lg-stream { margin-top: 16px; }

    .lg-entry {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 16px 0;
      border-top: 1px solid var(--border-light);
    }

    .lg-entry-main { flex: 1; min-width: 0; }

    .lg-entry-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .lg-entry-date {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-3);
    }

    .lg-class-tag { text-decoration: none; transition: border-color var(--transition-base), color var(--transition-base); }
    .lg-class-tag:hover { color: var(--text-1); border-color: rgba(var(--ink-rgb), .40); }

    .lg-entry-text {
      font-size: var(--text-body-sm);
      color: var(--text-2);
      line-height: 1.6;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      cursor: pointer;
      transition: opacity var(--transition-base);
    }

    .lg-entry-text:hover { opacity: .65; }

    .lg-note-edit {
      width: 100%;
      display: block;
      margin-top: 2px;
      min-height: 64px;
      background: var(--well-bg);
      box-shadow: var(--well), inset 0 0 0 1px rgba(var(--ink-rgb), .12);
      border: none;
      border-radius: var(--r);
      padding: 12px 14px;
      color: var(--text-1);
      font-family: var(--font);
      font-size: var(--text-body-sm);
      line-height: 1.6;
      resize: none;
      overflow: hidden;
      outline: none;
      transition: box-shadow var(--transition-base), background var(--transition-base);
    }

    .lg-note-edit:focus {
      background: rgba(var(--ink-rgb), .06);
      box-shadow: var(--well), inset 0 0 0 1px rgba(var(--accent-rgb), .60);
    }

    .lg-entry-del,
    .lg-entry-act {
      flex-shrink: 0;
      background: none;
      border: none;
      color: var(--text-3);
      cursor: pointer;
      padding: 2px 8px;
      font-size: 13px;
      line-height: 1;
      transition: color var(--transition-base);
    }

    .lg-entry-act:hover { color: var(--text-1); }

    .lg-entry-del:hover { color: var(--danger); }

    .lg-entry-del.confirm-delete-armed,
    .lg-entry-del.confirm-delete-armed:hover { color: var(--danger); }
  </style>
</head>

<body class="has-sidebar">
  <main>
    <section class="hero">
      <div class="inner">
        <p class="label-1">Teaching is a practice.</p>
        <h3>Teaching Log</h3>
        <p>A note after each class closes the loop. Attach notes to a class or just write them on their own. Write down what worked and what you&#8217;d change. What do you want to try next time? What felt really good? How did students respond?</p>
      </div>
    </section>

    <div class="wrap">

      <div class="library-bar" id="library-bar">
        <div class="search-wrap">
          <span class="search-icon"><span class="material-symbols-sharp">search</span></span>
          <input type="text" class="search-input" id="log-search" placeholder="Search your notes&#8230;" autocomplete="off" aria-label="Search your notes">
        </div>
        <button class="btn-primary" id="add-note-btn">
          <span class="material-symbols-sharp i-lg">add</span>
          Add a Note
        </button>
      </div>

      <div class="filter-row" id="log-filter">
        <button class="filter-chip active" data-filter="all">All</button>
        <button class="filter-chip" data-filter="classes">Classes</button>
        <button class="filter-chip" data-filter="experiments">Movement Experiments</button>
        <span class="result-count" id="result-count"></span>
      </div>

      <div class="lg-composer" id="lg-composer" hidden>
        <div class="lg-class-row" id="lg-class-row">
          <button type="button" class="lg-class-pick" id="lg-class-pick">
            <span class="material-symbols-sharp">import_contacts</span>
            <span id="lg-class-pick-label">Select a class</span>
          </button>
          <div class="lg-class-menu" id="lg-class-menu" hidden></div>
        </div>
        <textarea class="lg-area" id="lg-area" placeholder="Whatcha thinking? How was class?" aria-label="Teaching note"></textarea>
        <div class="lg-composer-actions">
          <button class="btn-ghost sm" id="lg-cancel">Cancel</button>
          <button class="btn-primary sm" id="lg-save">Save Note</button>
        </div>
      </div>

      <div class="lg-stream" id="lg-stream"></div>

    </div>
  </main>

  <script src="lib/version.js"></script>
  <script src="lib/nav.js"></script>
  <script src="lib/vendor/supabase-js-v2.110.7.min.js"></script>
  <script src="lib/supabase.js"></script>
  <script src="lib/telemetry.js"></script>
  <script src="lib/sync.js"></script>
  <script src="lib/motion.js"></script>
  <script src="lib/library.js"></script>
  <script src="lib/toast.js"></script>
  <script src="lib/confirm-delete.js"></script>
  <script>

    var KEY = 'flowschool_classes';
    var LOG_KEY = 'flowschool_lognotes';   // notes not tied to any class
    var FAVS_KEY = 'flowschool_favs';      // saved experiments carry reflections
    var classes = loadClasses();
    var logNotes = loadLog();
    var favs = loadFavs();

    // one load, one persist — the sync seam, same as every library
    function loadClasses() {
      try { return JSON.parse(localStorage.getItem(KEY) || '[]'); } catch (_) { return []; }
    }

    function persist() { localStorage.setItem(KEY, JSON.stringify(classes)); }

    function loadLog() {
      try { return JSON.parse(localStorage.getItem(LOG_KEY) || '[]'); } catch (_) { return []; }
    }

    function persistLog() { localStorage.setItem(LOG_KEY, JSON.stringify(logNotes)); }

    function loadFavs() {
      try { return JSON.parse(localStorage.getItem(FAVS_KEY) || '[]'); } catch (_) { return []; }
    }

    function persistFavs() { localStorage.setItem(FAVS_KEY, JSON.stringify(favs)); }

    var esc = fsEsc, fmtDate = fsFmtDate;

    function allEntries() {
      var out = [];
      classes.forEach(function (c) {
        (c.notesLog || []).forEach(function (n) {
          out.push({ ts: n.ts, text: n.text, classId: c.id, className: c.title || 'Untitled Class' });
        });
      });
      logNotes.forEach(function (n) {
        out.push({ ts: n.ts, text: n.text, classId: null, className: null });
      });
      // reflections written on saved movement experiments — reads the
      // notesLog shape, plus the brief single-note shape in case the
      // experiments page hasn't run its migration yet
      favs.forEach(function (f) {
        if (!f) return;
        (f.notesLog || []).forEach(function (n) {
          out.push({ ts: n.ts, text: n.text, classId: null, className: null,
                     expId: f.id, expTitle: f.title });
        });
        if (f.note) {
          out.push({ ts: f.noteTs || f.savedAt, text: f.note, classId: null, className: null,
                     expId: f.id, expTitle: f.title });
        }
      });
      out.sort(function (a, b) { return b.ts - a.ts; });
      return out;
    }

    var logFilter = 'all';

    function render() {
      var q = document.getElementById('log-search').value.trim().toLowerCase();
      var entries = allEntries();
      var filtered = entries;
      if (logFilter === 'classes') {
        filtered = filtered.filter(function (e) { return e.classId != null; });
      } else if (logFilter === 'experiments') {
        filtered = filtered.filter(function (e) { return e.expId != null; });
      }
      if (q) {
        filtered = filtered.filter(function (e) {
          var where = e.className || e.expTitle || '';
          return e.text.toLowerCase().indexOf(q) !== -1 || where.toLowerCase().indexOf(q) !== -1;
        });
      }

      var stream = document.getElementById('lg-stream');
      var hadGhosts = !!stream.querySelector('.library-empty-ghost');
      var filterRow = document.getElementById('log-filter');

      if (!entries.length) {
        filterRow.hidden = true;
        stream.innerHTML = '<div class="library-empty">' +
          fsGhostRows() +
          '<p class="library-empty-headline">The notes start after you teach.</p>' +
          '<p class="library-empty-sub">Add a note from any class &#8212; or right here &#8212; and your teaching history starts writing itself.</p>' +
          '</div>';
        return;
      }

      filterRow.hidden = false;
      document.getElementById('result-count').textContent =
        filtered.length + (filtered.length === 1 ? ' note' : ' notes');

      if (!filtered.length) {
        stream.innerHTML = '<div class="library-empty"><p class="library-empty-sub">' +
          (q ? 'Nothing matches &#8220;' + esc(q) + '&#8221;.'
             : (logFilter === 'classes' ? 'No class notes yet.' : 'No experiment notes yet.')) +
          '</p></div>';
        return;
      }

      stream.innerHTML = filtered.map(function (e) {
        var tag = e.classId
          ? '<a class="lg-class-tag" href="your-classes?id=' + e.classId + '">' + esc(e.className) + '</a>'
          : (e.expId != null
            ? '<a class="lg-class-tag" href="movement-experiments?exp=' + e.expId + '">' + esc(e.expTitle) + '</a>'
            : '');
        var addr = 'data-cid="' + (e.classId != null ? e.classId : '') + '" data-exp="' + (e.expId != null ? e.expId : '') + '" data-ts="' + e.ts + '"';
        return '<div class="lg-entry" ' + addr + '>' +
          '<div class="lg-entry-main">' +
            '<div class="lg-entry-head">' +
              '<span class="lg-entry-date">' + fmtDate(e.ts) + '</span>' +
              tag +
            '</div>' +
            '<div class="lg-entry-text" title="Edit note">' + esc(e.text) + '</div>' +
          '</div>' +
          '<button class="lg-entry-act" title="Edit note" aria-label="Edit note"><span class="material-symbols-sharp i-sm">edit</span></button>' +
          '<button class="lg-entry-del" ' + addr + ' title="Delete note"><span class="material-symbols-sharp i-sm">close</span></button>' +
        '</div>';
      }).join('');

      stream.querySelectorAll('.lg-entry-text, .lg-entry-act').forEach(function (el) {
        el.addEventListener('click', function () {
          startLogNoteEdit(el.closest('.lg-entry'));
        });
      });

      stream.querySelectorAll('.lg-entry-del').forEach(function (btn) {
        wireConfirmDelete(btn, function () {
          var ts = parseInt(btn.dataset.ts, 10);
          if (btn.dataset.exp !== '') {
            // an experiment reflection — the note goes, the saved
            // experiment stays
            var fav = favs.find(function (x) { return x.id === parseInt(btn.dataset.exp, 10); });
            if (fav) {
              fav.notesLog = (fav.notesLog || []).filter(function (n) { return n.ts !== ts; });
              if (fav.note && (fav.noteTs || fav.savedAt) === ts) { delete fav.note; delete fav.noteTs; }
              persistFavs();
            }
          } else if (btn.dataset.cid === '') {
            // a class-less note lives in its own store
            logNotes = logNotes.filter(function (n) { return n.ts !== ts; });
            persistLog();
          } else {
            var c = classes.find(function (x) { return x.id === parseInt(btn.dataset.cid, 10); });
            if (!c) return;
            c.notesLog = (c.notesLog || []).filter(function (n) { return n.ts !== ts; });
            persist();
          }
          toast('Note removed.');
          render();
        });
      });
      fsGhostSettle(stream, hadGhosts);
    }

    // every note in the stream lives in one of three stores — resolve
    // the row's address back to the live object and its persist
    function noteRef(cid, exp, ts) {
      if (exp !== '') {
        var fav = favs.find(function (x) { return x.id === parseInt(exp, 10); });
        if (!fav) return null;
        var n = (fav.notesLog || []).find(function (x) { return x.ts === ts; });
        if (!n && fav.note && (fav.noteTs || fav.savedAt) === ts) {
          // brief single-note shape — fold it into the log on touch
          fav.notesLog = fav.notesLog || [];
          n = { ts: ts, text: fav.note };
          fav.notesLog.push(n);
          delete fav.note;
          delete fav.noteTs;
        }
        return n ? { note: n, save: persistFavs } : null;
      }
      if (cid === '') {
        var n2 = logNotes.find(function (x) { return x.ts === ts; });
        return n2 ? { note: n2, save: persistLog } : null;
      }
      var c = classes.find(function (x) { return x.id === parseInt(cid, 10); });
      if (!c) return null;
      var n3 = (c.notesLog || []).find(function (x) { return x.ts === ts; });
      return n3 ? { note: n3, save: persist } : null;
    }

    // the note grammar from Your Classes, on the stream: the words
    // become the well, check keeps them, x or Esc keeps the old ones,
    // clicking away saves too
    function startLogNoteEdit(row) {
      var ref = noteRef(row.dataset.cid, row.dataset.exp, parseInt(row.dataset.ts, 10));
      if (!ref || row.classList.contains('editing')) return;
      row.classList.add('editing');
      var main = row.querySelector('.lg-entry-main');
      var head = row.querySelector('.lg-entry-head');
      main.innerHTML = head.outerHTML +
        '<textarea class="lg-note-edit" aria-label="Note"></textarea>';
      row.querySelector('.lg-entry-act').remove();
      row.querySelector('.lg-entry-del').outerHTML =
        '<button type="button" class="lg-entry-act" data-act="save" title="Save note" aria-label="Save note"><span class="material-symbols-sharp i-sm">check</span></button>' +
        '<button type="button" class="lg-entry-act" data-act="cancel" title="Cancel" aria-label="Cancel"><span class="material-symbols-sharp i-sm">close</span></button>';

      var area = row.querySelector('.lg-note-edit');
      area.value = ref.note.text;
      fsAutoGrow(area);
      area.focus();
      area.setSelectionRange(area.value.length, area.value.length);
      area.addEventListener('input', function () { fsAutoGrow(area); });

      var closed = false;
      function done() {
        if (closed) return;
        closed = true;
        render();
      }
      function save() {
        if (closed) return;
        var t = area.value.trim();
        if (!t || t === ref.note.text) { done(); return; }
        ref.note.text = t;
        ref.save();
        done();
        toast('Note updated.');
      }

      area.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') { e.stopPropagation(); done(); }
        if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); save(); }
      });
      row.querySelector('[data-act="save"]').addEventListener('click', save);
      row.querySelector('[data-act="cancel"]').addEventListener('click', done);

      var cancelDown = false;
      row.querySelector('[data-act="cancel"]').addEventListener('mousedown', function () {
        cancelDown = true;
      });
      area.addEventListener('blur', function () {
        setTimeout(function () {
          if (cancelDown) { cancelDown = false; return; }
          save();
        }, 0);
      });
    }

    // ─── COMPOSER — a note belongs to a class ────────────────────────

    var composeClassId = null;

    function openComposer() {
      composeClassId = null;
      // attaching a class is optional; hide the picker entirely when there
      // are no classes to attach to
      document.getElementById('lg-class-row').hidden = !classes.length;
      document.getElementById('lg-class-pick-label').textContent = 'Attach to a class (optional)';
      document.getElementById('lg-class-pick').classList.remove('chosen');
      document.getElementById('lg-area').value = '';
      fsUnfold(document.getElementById('lg-composer'), true);
      document.getElementById('add-note-btn').disabled = true;
      renderClassMenu();
      document.getElementById('lg-area').focus();
    }

    function closeComposer() {
      fsUnfold(document.getElementById('lg-composer'), false);
      document.getElementById('lg-class-menu').hidden = true;
      document.getElementById('add-note-btn').disabled = false;
    }

    function renderClassMenu() {
      var menu = document.getElementById('lg-class-menu');
      var list = classes.slice().sort(fsSorterFor('edited'));
      // a "No class" option at the top lets you detach after choosing
      var none = '<button type="button" class="lg-class-row-item" data-id="">No class</button>';
      menu.innerHTML = none + list.map(function (c) {
        return '<button type="button" class="lg-class-row-item" data-id="' + c.id + '">' + esc(c.title || 'Untitled Class') + '</button>';
      }).join('');
    }

    document.getElementById('add-note-btn').addEventListener('click', function (e) {
      e.stopPropagation(); // the opening click must not bubble into the close-on-outside listener
      openComposer();
    });

    document.getElementById('lg-cancel').addEventListener('click', closeComposer);

    document.getElementById('lg-class-pick').addEventListener('click', function (e) {
      e.stopPropagation();
      var menu = document.getElementById('lg-class-menu');
      if (menu.hidden) renderClassMenu();
      menu.hidden = !menu.hidden;
    });

    document.getElementById('lg-class-menu').addEventListener('click', function (e) {
      var item = e.target.closest('.lg-class-row-item');
      if (!item) return;
      e.stopPropagation();
      if (item.dataset.id === '') {
        composeClassId = null;
        document.getElementById('lg-class-pick-label').textContent = 'No class';
        document.getElementById('lg-class-pick').classList.add('chosen');
      } else {
        composeClassId = parseInt(item.dataset.id, 10);
        document.getElementById('lg-class-pick-label').textContent = item.textContent;
        document.getElementById('lg-class-pick').classList.add('chosen');
      }
      document.getElementById('lg-class-menu').hidden = true;
      document.getElementById('lg-area').focus();
    });

    document.addEventListener('click', function () {
      var menu = document.getElementById('lg-class-menu');
      if (!menu.hidden) menu.hidden = true;
    });

    document.getElementById('lg-area').addEventListener('input', function () { fsAutoGrow(this); });

    document.getElementById('lg-save').addEventListener('click', function () {
      var text = document.getElementById('lg-area').value.trim();
      if (!text) { toast('Write the note first.'); document.getElementById('lg-area').focus(); return; }
      if (composeClassId) {
        var c = classes.find(function (x) { return x.id === composeClassId; });
        if (!c) return;
        if (!c.notesLog) c.notesLog = [];
        c.notesLog.unshift({ ts: Date.now(), text: text });
        persist();
      } else {
        // a class-less note — saves to its own store, shows in the stream
        logNotes.unshift({ ts: Date.now(), text: text });
        persistLog();
      }
      closeComposer();
      toast('Noted.');
      render();
    });

    var searchT; // the list changes at typing pauses, not per keystroke
    document.getElementById('log-filter').addEventListener('click', function (e) {
      var chip = e.target.closest('.filter-chip');
      if (!chip) return;
      logFilter = chip.dataset.filter;
      document.querySelectorAll('#log-filter .filter-chip').forEach(function (c) {
        c.classList.toggle('active', c === chip);
      });
      render();
    });

    document.getElementById('log-search').addEventListener('input', function () {
      clearTimeout(searchT);
      searchT = setTimeout(render, 140);
    });

    render();
  </script>
  <script src="lib/tracker.js"></script>

  <div class="toast" id="toast"></div>
</body>

</html>
