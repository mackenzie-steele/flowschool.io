<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <script>!function(){var t=localStorage.getItem("fs-theme");document.documentElement.setAttribute("data-theme",t||"dark")}()</script>
  <style>html{background:#151515;color-scheme:dark}html[data-theme="light"]{background:#F5F4F0;color-scheme:light}</style>
<link rel="icon" href="img/flow-school-favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Flow School</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Sharp:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
<link rel="stylesheet" href="global.css">
<style>
body { display: flex; flex-direction: column; min-height: 100vh; }
</style>
</head>
<body>


<main class="auth-main">
  <div class="card auth-card">
    <a href="login">
      <img src="img/flow-school-logo_black.png" class="auth-wordmark logo-light" alt="Flow School">
      <img src="img/flow-school-logo_white.png" class="auth-wordmark logo-dark" alt="Flow School">
    </a>
    <span class="auth-eyebrow">The creative studio for yoga teachers</span>
    <h1 class="auth-title" id="page-title">Choose a new password.</h1>

    <form class="auth-form" id="auth-form" novalidate>
      <div class="field">
        <label class="field-label" for="password">New password</label>
        <div class="field-input-wrap">
          <input class="field-input" type="password" id="password" placeholder="8+ characters: upper & lowercase, number, symbol" autocomplete="new-password" required>
          <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Show password">
            <span class="material-symbols-sharp" id="eye-icon">visibility</span>
          </button>
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="password2">Confirm new password</label>
        <div class="field-input-wrap">
          <input class="field-input" type="password" id="password2" placeholder="Same password again" autocomplete="new-password" required>
        </div>
      </div>

      <div class="auth-error" id="auth-error"></div>
      <div class="auth-success" id="auth-success"></div>

      <button type="submit" class="btn-primary auth-submit" id="submit-btn">Set new password</button>
    </form>

    <div class="auth-footer">
      Remembered it after all? <a href="login">Sign in</a>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="lib/supabase.js"></script>
<script src="lib/version.js"></script>
<script src="lib/telemetry.js"></script>
<script src="lib/motion.js"></script>
<script>

// Two ways in from a recovery email:
// · token_hash link (the scanner-proof pattern): the email carries a hash,
//   nothing is consumed until the human submits — verifyOtp runs then.
// · legacy hash-token link: the client absorbs a session on load.
let recoveryReady = false;
const tokenHash = new URLSearchParams(window.location.search).get('token_hash');

function showInvalid() {
  document.getElementById('auth-form').hidden = true;
  document.getElementById('page-title').textContent = 'This link has expired.';
  const errEl = document.getElementById('auth-error');
  errEl.textContent = 'Reset links only work once and expire quickly. Head back to sign in and request a fresh one.';
  errEl.classList.add('show');
}

db.auth.onAuthStateChange((event, session) => {
  if (session) recoveryReady = true;
});

(async () => {
  // token_hash flow: the form is live now; the token is only spent at
  // submit, so link scanners can load this page without killing it
  if (tokenHash) { recoveryReady = true; return; }
  // legacy flow: give the client time to absorb the URL token — a slow
  // exchange isn't a dead link, so poll up to 3s before declaring expired
  for (let i = 0; i < 15; i++) {
    const { data: { session } } = await db.auth.getSession();
    if (session) { recoveryReady = true; break; }
    await new Promise(r => setTimeout(r, 200));
  }
  if (!recoveryReady) showInvalid();
})();

// Leaving without finishing must not smuggle the recovery session into
// the app — a recovery link IS a login, so "Sign in" (and the logo) sign
// that session out first. Completing the reset keeps it, as proof earned.
document.querySelectorAll('a[href="login"]').forEach(a => {
  a.addEventListener('click', async e => {
    e.preventDefault();
    try { await db.auth.signOut(); } catch (_) {}
    window.location.href = 'login';
  });
});

// Password toggle
document.getElementById('pw-toggle').addEventListener('click', () => {
  const input = document.getElementById('password');
  const isText = input.type === 'text';
  input.type = isText ? 'password' : 'text';
  document.getElementById('eye-icon').textContent = isText ? 'visibility_off' : 'visibility';
});

// Password rule — mirrors the Supabase Auth requirement (8+ chars,
// lower + upper + digit + symbol). Returns the first problem, or null.
function passwordProblem(pw) {
  if (pw.length < 8)            return 'Passwords need at least 8 characters.';
  if (!/[a-z]/.test(pw))        return 'Passwords need a lowercase letter.';
  if (!/[A-Z]/.test(pw))        return 'Passwords need an uppercase letter.';
  if (!/[0-9]/.test(pw))        return 'Passwords need a number.';
  if (!/[^A-Za-z0-9]/.test(pw)) return 'Passwords need a symbol (like ! or #).';
  return null;
}

// Set the new password
document.getElementById('auth-form').addEventListener('submit', async e => {
  e.preventDefault();
  const a = document.getElementById('password').value;
  const b = document.getElementById('password2').value;
  const errEl = document.getElementById('auth-error');
  const sucEl = document.getElementById('auth-success');
  const btn = document.getElementById('submit-btn');

  errEl.classList.remove('show');
  sucEl.classList.remove('show');

  const pwProblem = passwordProblem(a);
  if (pwProblem) { errEl.textContent = pwProblem; errEl.classList.add('show'); return; }
  if (a !== b) { errEl.textContent = 'Those passwords don’t match.'; errEl.classList.add('show'); return; }

  fsWorking(btn, true, 'Saving…');

  // token_hash flow: NOW the token gets spent — human finger on the button.
  // A token verifies exactly once; if a session already exists (e.g. a
  // second attempt after "same as your old password"), skip re-verifying.
  if (tokenHash) {
    const { data: { session: hashSession } } = await db.auth.getSession();
    if (!hashSession) {
      const { error: vErr } = await db.auth.verifyOtp({ type: 'recovery', token_hash: tokenHash });
      if (vErr) { showInvalid(); return; }
    }
  } else {
    // legacy flow: the session can expire between landing and submitting —
    // say so in plain words instead of surfacing "Auth session missing!"
    const { data: { session: liveSession } } = await db.auth.getSession();
    if (!liveSession) { showInvalid(); return; }
  }
  const { error } = await db.auth.updateUser({ password: a });

  if (error) {
    errEl.textContent = error.message || 'Couldn’t set that password. Request a fresh link and try again.';
    errEl.classList.add('show');
    fsWorking(btn, false, 'Set new password');
  } else {
    sucEl.textContent = 'Password updated — taking you in…';
    sucEl.classList.add('show');
    setTimeout(() => { window.location.href = 'dashboard'; }, 900);
  }
});

</script>
  <footer class="site-footer">Flow School &#183; Creative Studio for Yoga Teachers</footer>
</body>
</html>
