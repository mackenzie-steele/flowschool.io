<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <script>!function(){var t=localStorage.getItem("fs-theme");document.documentElement.setAttribute("data-theme",t||"dark")}()</script>
  <style>html{background:#151515;color-scheme:dark}html[data-theme="light"]{background:#F5F4F0;color-scheme:light}</style>
<link rel="icon" href="img/flow-school-favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Flow School</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Sharp:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
<link rel="stylesheet" href="global.css">
  <script>try{var s=JSON.parse(localStorage.getItem('sb-zizuopmcpzicbwngjagp-auth-token'));if(s&&s.user&&(!s.expires_at||s.expires_at>Date.now()/1e3))document.documentElement.classList.add('fs-authed')}catch(e){}</script>
<style>
body { display: flex; flex-direction: column; min-height: 100vh; }
#pw-field[hidden] { display: none; }
/* only a probably-signed-in visitor (about to be redirected) is gated —
   everyone else paints immediately and pageEnter plays as designed */
.fs-authed body { opacity: 0; transition: opacity .18s; }
</style>
</head>
<body>


<main class="auth-main">
  <div class="card auth-card">
    <a href="dashboard">
      <img src="img/flow-school-logo_black.png" class="auth-wordmark logo-light" alt="Flow School">
      <img src="img/flow-school-logo_white.png" class="auth-wordmark logo-dark" alt="Flow School">
    </a>
    <span class="auth-eyebrow">The creative studio for yoga teachers</span>
    <h1 class="auth-title">Welcome back.</h1>

    <form class="auth-form" id="auth-form" novalidate>
      <div class="field">
        <label class="field-label" for="email">Email</label>
        <div class="field-input-wrap">
          <input class="field-input" type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
        </div>
      </div>

      <div class="field" id="pw-field">
        <label class="field-label" for="password">Password</label>
        <div class="field-input-wrap">
          <input class="field-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
          <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Show password">
            <span class="material-symbols-sharp" id="eye-icon">visibility</span>
          </button>
        </div>
      </div>

      <div class="auth-forgot">
        <button type="button" class="auth-forgot-link" id="forgot-toggle">Forgot password?</button>
      </div>

      <div class="auth-error" id="auth-error"></div>
      <div class="auth-success" id="auth-success"></div>

      <button type="submit" class="btn-primary auth-submit" id="submit-btn">Sign in</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="signup">Create one</a> &nbsp;&middot;&nbsp; <a href="privacy">Privacy</a>
    </div>
  </div>
</main>

<script src="lib/vendor/supabase-js-v2.110.7.min.js"></script>
<script src="lib/supabase.js"></script>
<script src="lib/version.js"></script>
<script src="lib/telemetry.js"></script>
<script src="lib/motion.js"></script>
<script>

// Auth redirects (email confirmation etc.) land here carrying tokens or
// errors in the URL — the client absorbs valid tokens into a session during
// init, so getUser() below resolves the confirmed user automatically.
const authHash = new URLSearchParams((window.location.hash || '').replace(/^#/, ''));
const authQuery = new URLSearchParams(window.location.search);
const authLinkError = authHash.get('error_description') || authQuery.get('error_description')
  || authHash.get('error') || authQuery.get('error');
const confirmType = authHash.get('type');

// Redirect if already logged in
(async () => {
  const { data: { user } } = await db.auth.getUser();
  if (user) {
    if (confirmType === 'signup') {
      // arrived straight from the confirmation email — say so, then in
      document.body.style.opacity = '1';
      history.replaceState(null, '', 'login');
      const sucEl = document.getElementById('auth-success');
      sucEl.textContent = 'Email confirmed — welcome in.';
      sucEl.classList.add('show');
      setTimeout(() => { window.location.href = 'dashboard'; }, 1100);
      return;
    }
    window.location.href = 'dashboard';
    return;
  }
  document.body.style.opacity = '1';
  if (authLinkError) {
    history.replaceState(null, '', 'login');
    const errEl = document.getElementById('auth-error');
    errEl.textContent = 'That link is invalid or has expired. Sign in — or request a fresh one.';
    errEl.classList.add('show');
  }
})();

// Password toggle
document.getElementById('pw-toggle').addEventListener('click', () => {
  const input = document.getElementById('password');
  const isText = input.type === 'text';
  input.type = isText ? 'password' : 'text';
  document.getElementById('eye-icon').textContent = isText ? 'visibility_off' : 'visibility';
});

// Forgot-password mode — the same card, one field fewer
let resetMode = false;
document.getElementById('forgot-toggle').addEventListener('click', () => {
  resetMode = !resetMode;
  // the field folds away instead of vanishing; the words crossfade
  fsUnfold(document.getElementById('pw-field'), !resetMode);
  document.getElementById('password').required = !resetMode;
  fsSetLabel(document.querySelector('.auth-title'), resetMode ? 'Reset your password.' : 'Welcome back.');
  fsSetLabel(document.getElementById('submit-btn'), resetMode ? 'Send reset link' : 'Sign in');
  fsSetLabel(document.getElementById('forgot-toggle'), resetMode ? 'Back to sign in' : 'Forgot password?');
  document.getElementById('auth-error').classList.remove('show');
  document.getElementById('auth-success').classList.remove('show');
});

// Sign in (or send the reset link, in forgot mode)
document.getElementById('auth-form').addEventListener('submit', async e => {
  e.preventDefault();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl    = document.getElementById('auth-error');
  const sucEl    = document.getElementById('auth-success');
  const btn      = document.getElementById('submit-btn');

  errEl.classList.remove('show');
  sucEl.classList.remove('show');

  if (resetMode) {
    if (!email) { errEl.textContent = 'Enter your email and we’ll send a reset link.'; errEl.classList.add('show'); return; }
    fsWorking(btn, true, 'Sending…');
    const { error } = await db.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/reset-password',
    });
    fsWorking(btn, false, 'Send reset link');
    if (error) {
      errEl.textContent = error.message || 'Couldn’t send the link. Try again in a moment.';
      errEl.classList.add('show');
    } else {
      sucEl.textContent = 'Check ' + email + ' for a reset link. It expires quickly — use it soon.';
      sucEl.classList.add('show');
    }
    return;
  }

  if (!email || !password) { errEl.textContent = 'Please enter your email and password.'; errEl.classList.add('show'); return; }

  fsWorking(btn, true, 'Signing in…');

  const { error } = await db.auth.signInWithPassword({ email, password });

  if (error) {
    const msg = error.message || '';
    errEl.textContent = msg.includes('Invalid login') || msg.includes('invalid_credentials')
      ? 'Email or password is incorrect.'
      : msg.includes('Email not confirmed')
        ? 'Please confirm your email before signing in.'
        : msg || 'Something went wrong. Please try again.';
    errEl.classList.add('show');
    fsWorking(btn, false, 'Sign in');
  } else {
    // Warm the account cache so the app renders your work immediately.
    try {
      const { data: rows } = await db.from('user_data').select('collection,payload');
      (rows || []).forEach(r => {
        try { localStorage.setItem(r.collection, JSON.stringify(r.payload == null ? [] : r.payload)); } catch (_) {}
      });
    } catch (_) {}
    // Warm identity (name + photo) so the nav avatar shows immediately.
    try {
      const { data: { user } } = await db.auth.getUser();
      if (user) {
        const { data: prof } = await db.from('profiles').select('display_name, avatar_url').eq('id', user.id).single();
        if (prof) {
          localStorage.setItem('fs-display-name', prof.display_name || '');
          const { data: hRow } = await db.from('handles').select('handle').eq('user_id', user.id).maybeSingle();
          if (hRow && hRow.handle) localStorage.setItem('fs-handle', hRow.handle);
          else localStorage.removeItem('fs-handle');
          if (prof.avatar_url) localStorage.setItem('fs-avatar-url', prof.avatar_url);
          else localStorage.removeItem('fs-avatar-url');
        }
      }
    } catch (_) {}
    window.location.href = 'dashboard';
  }
});

</script>
  <footer class="site-footer">Flow School &#183; Creative Studio for Yoga Teachers</footer>
</body>
</html>
