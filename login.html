<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Flow School</title>
<link rel="stylesheet" href="global.css">
<style>
body { display: flex; flex-direction: column; min-height: 100vh; opacity: 0; transition: opacity .18s; }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<header class="auth-hdr">
  <a href="index.html" class="hdr-logo">Flow School</a>
</header>

<main class="auth-main">
  <div class="card auth-card">
    <span class="auth-eyebrow">Flow School</span>
    <h1 class="auth-title">Welcome back.</h1>

    <form class="auth-form" id="auth-form" novalidate>
      <div class="field">
        <label class="field-label" for="email">Email</label>
        <div class="field-input-wrap">
          <input class="field-input" type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="password">Password</label>
        <div class="field-input-wrap">
          <input class="field-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
          <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Show password">
            <span class="material-symbols-sharp" id="eye-icon">visibility</span>
          </button>
        </div>
      </div>

      <div class="auth-error" id="auth-error"></div>

      <button type="submit" class="btn-primary auth-submit" id="submit-btn">Sign in</button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="signup.html">Create one</a>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="lib/supabase.js"></script>
<script>

// Redirect if already logged in
(async () => {
  const { data: { user } } = await db.auth.getUser();
  if (user) { window.location.href = 'dashboard.html'; return; }
  document.body.style.opacity = '1';
})();

// Password toggle
document.getElementById('pw-toggle').addEventListener('click', () => {
  const input = document.getElementById('password');
  const isText = input.type === 'text';
  input.type = isText ? 'password' : 'text';
  document.getElementById('eye-icon').textContent = isText ? 'visibility_off' : 'visibility';
});

// Sign in
document.getElementById('auth-form').addEventListener('submit', async e => {
  e.preventDefault();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl    = document.getElementById('auth-error');
  const btn      = document.getElementById('submit-btn');

  errEl.classList.remove('show');
  if (!email || !password) { errEl.textContent = 'Please enter your email and password.'; errEl.classList.add('show'); return; }

  btn.disabled = true;
  btn.textContent = 'Signing in…';

  const { error } = await db.auth.signInWithPassword({ email, password });

  if (error) {
    const msg = error.message || '';
    errEl.textContent = msg.includes('Invalid login') || msg.includes('invalid_credentials')
      ? 'Email or password is incorrect.'
      : msg.includes('Email not confirmed')
        ? 'Please confirm your email before signing in.'
        : msg || 'Something went wrong. Please try again.';
    errEl.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Sign in';
  } else {
    window.location.href = 'dashboard.html';
  }
});

</script>
</body>
</html>
