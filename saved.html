<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <script>!function(){var t=localStorage.getItem("fs-theme");document.documentElement.setAttribute("data-theme",t||"dark")}()</script>
  <style>html{background:#14161B;color-scheme:dark}html[data-theme="light"]{background:#F7F6F4;color-scheme:light}</style>
  <link rel="icon" href="img/flow-school-favicon.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saved — Flow School</title>
  <link rel="stylesheet" href="global.css">
  <script src="lib/icons.js"></script>
  <style>
    /* ── Library bar — search, the standard pattern ── */
    .library-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .library-bar .search-wrap { flex: 1; }

    .filter-row .filter-chip { flex-shrink: 0; }

    #sv-root { margin-top: 16px; }

    @media (max-width: 620px) {
      .result-count { display: none; }
    }
    .library-bar[hidden] { display: none; }

    /* ── Section ── */
    .sv-section {
      margin-bottom: 40px;
    }

    .sv-section-hdr {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-light);
      margin-bottom: 4px;
    }

    .sv-eyebrow {
      font-size: 10px;
      font-weight: var(--weight-semibold);
      letter-spacing: .10em;
      text-transform: uppercase;
      color: var(--text-3);
    }

    .sv-count {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-3);
      background: rgba(var(--ink-rgb), .06);
      border-radius: var(--r);
      padding: 1px 8px;
    }

    /* ── Item row ── */
    .sv-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-light);
      text-decoration: none;
      color: inherit;
      transition: opacity var(--transition-base);
    }

    .sv-item:last-child { border-bottom: none; }
    .sv-item:hover { opacity: .65; }

    .sv-icon {
      width: 32px;
      height: 32px;
      background: rgba(var(--ink-rgb), .06);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .sv-icon .material-symbols-sharp { font-size: var(--icon-md); color: var(--text-2); }

    .sv-info { flex: 1; min-width: 0; }

    .sv-name {
      display: block;
      font-size: var(--text-ui);
      color: var(--text-1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sv-time {
      display: block;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: .04em;
      color: var(--text-3);
      margin-top: 2px;
    }

    .sv-arrow {
      color: var(--text-3);
      flex-shrink: 0;
      opacity: 0;
      transition: opacity var(--transition-base);
    }

    .sv-item:hover .sv-arrow { opacity: 1; }

    /* ── Empty state ── */
    .sv-empty {
      padding: 16px 0 8px;
      font-size: var(--text-ui);
      color: var(--text-3);
      font-style: italic;
    }

    /* ── Global empty ── */
    .sv-all-empty {
      padding: 56px 0;
      text-align: center;
    }

    .sv-all-empty p {
      font-size: var(--fs-body);
      color: var(--text-3);
      margin: 0 0 20px;
    }
  </style>
</head>

<body class="has-sidebar">

  <script src="lib/version.js"></script>
  <script src="lib/nav.js"></script>
  <script src="lib/vendor/supabase-js-v2.110.7.min.js"></script>
  <script src="lib/supabase.js"></script>
  <script src="lib/telemetry.js"></script>
  <script src="lib/sync.js"></script>
<script src="lib/library.js"></script>
  <script src="lib/toast.js"></script>
  <div class="toast" id="toast"></div>

  <style>
    /* ── sync status — the honesty line ── */
    .sv-sync {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-top: 12px;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: var(--ls-label);
      text-transform: uppercase;
      color: var(--text-3);
    }
    .sv-sync i {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(var(--ink-rgb), .25);
      transition: background var(--transition-base);
      /* no class = syncing — the dot wears the house working pulse */
      animation: fsBreathe 2s ease-in-out infinite;
    }
    .sv-sync i.on  { background: var(--accent); animation: none; }
    .sv-sync i.err { background: var(--danger); animation: none; }

    @media (prefers-reduced-motion: reduce) {
      .sv-sync i { animation: none; opacity: .6; }
      .sv-sync i.on, .sv-sync i.err { opacity: 1; }
    }
  </style>

  <main>
  <section class="hero">
    <div class="inner">
      <p class="label-1">Your library</p>
      <h3>Saved</h3>
      <p class="sv-sync" id="sv-sync"></p>
    </div>
  </section>

  <div class="wrap">
    <div class="library-bar" id="sv-bar" hidden>
      <div class="search-wrap">
        <span class="search-icon"><span class="material-symbols-sharp">search</span></span>
        <input type="text" class="search-input" id="sv-search" placeholder="Search your library&#8230;" autocomplete="off" aria-label="Search your library">
      </div>
    </div>
    <div class="filter-row" id="sv-filter" hidden></div>
    <div id="sv-root"></div>
  </div>
  </main>


  <script>
  (function () {
    function timeAgo(ts) {
      if (!ts) return '';
      var diff = Date.now() - ts;
      var m = Math.floor(diff / 60000);
      if (m < 1)  return 'just now';
      if (m < 60) return m + 'm ago';
      var h = Math.floor(m / 60);
      if (h < 24) return h + 'h ago';
      var d = Math.floor(h / 24);
      if (d < 7)  return d + 'd ago';
      var wk = Math.floor(d / 7);
      if (wk < 5) return wk + 'w ago';
      // older than a season: the date says more than “14mo ago”
      return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // sections mirror the nav: Play → Plan → Practice, labels match each
    // page's title, icons match the sidebar
    var sections = [
      {
        key: 'arbitrary-rules',
        label: 'Arbitrary Rules',
        icon: 'casino',
        load: function () {
          try {
            return JSON.parse(localStorage.getItem('flowschool_arules') || '[]').map(function (r) {
              var name = r.title || 'Saved Challenge';
              if (name.length > 80) name = name.slice(0, 77) + '…';
              return {
                name: name,
                href: 'arbitrary-rules?challenge=' + r.id,
                time: r.id || 0,
              };
            });
          } catch (_) { return []; }
        },
      },
      {
        key: 'pose-connector',
        label: 'Pose Popcorn',
        icon: 'conversion_path',
        load: function () {
          try {
            return JSON.parse(localStorage.getItem('fs-pose-connector-saved') || '[]').map(function (c) {
              return {
                name: c.name || 'Untitled Chain',
                href: 'pose-popcorn?chain=' + (c.savedAt || ''),
                time: c.savedAt || 0,
              };
            });
          } catch (_) { return []; }
        },
      },
      {
        key: 'movement-experiments',
        label: 'Movement Experiments',
        icon: 'gesture',
        load: function () {
          try {
            return JSON.parse(localStorage.getItem('flowschool_favs') || '[]').map(function (f) {
              return {
                name: typeof f === 'object' ? (f.title || 'Movement Experiment') : 'Movement Experiment',
                href: 'movement-experiments?exp=' + (typeof f === 'object' ? f.id : f),
                time: typeof f === 'object' ? (f.savedAt || 0) : 0,
              };
            });
          } catch (_) { return []; }
        },
      },
      {
        key: 'playlists',
        label: 'Playlist Builder',
        icon: 'queue_music',
        load: function () {
          try {
            return JSON.parse(localStorage.getItem('flowschool_playlists') || '[]').map(function (p) {
              return {
                name: p.title || 'Untitled Playlist',
                href: 'playlist-builder?id=' + p.id,
                time: p.savedAt ? new Date(p.savedAt).getTime() : 0,
              };
            });
          } catch (_) { return []; }
        },
      },
      {
        key: 'classes',
        label: 'Your Classes',
        icon: 'edit_document',
        load: function () {
          try {
            return JSON.parse(localStorage.getItem('flowschool_classes') || '[]').map(function (c) {
              return {
                name: c.title || 'Untitled Class',
                href: 'your-classes?id=' + c.id,
                time: c.editedAt || c.id || 0,
              };
            });
          } catch (_) { return []; }
        },
      },
      {
        key: 'flows',
        label: 'Your Flows',
        icon: 'airline_stops',
        load: function () {
          try {
            return JSON.parse(localStorage.getItem('flowschool_flows') || '[]').map(function (f) {
              return {
                name: f.name || 'Untitled Flow',
                href: 'your-flows?id=' + f.id,
                time: f.editedAt || f.id || 0,
              };
            });
          } catch (_) { return []; }
        },
      },
      {
        key: 'stories',
        label: 'Your Stories',
        icon: 'library_books',
        load: function () {
          try {
            return JSON.parse(localStorage.getItem('flowschool_stories') || '[]').map(function (st) {
              var name = st.text || 'Saved Story';
              if (name.length > 80) name = name.slice(0, 77) + '…';
              return {
                name: name,
                href: 'stories?id=' + st.id,
                time: st.id || 0,
              };
            });
          } catch (_) { return []; }
        },
      },
      {
        key: 'cue-flows',
        label: 'Your Cues',
        icon: 'edit_note',
        load: function () {
          try {
            var flows = JSON.parse(localStorage.getItem('fs-cue-flows') || '{}');
            return Object.values(flows).map(function (fl) {
              return {
                name: fl.name || 'Untitled Flow',
                href: 'your-cues?flow=' + encodeURIComponent(fl.name),
                time: fl.savedAt ? new Date(fl.savedAt).getTime() : 0,
              };
            });
          } catch (_) { return []; }
        },
      },
    ];

    function renderSection(s, items) {
      items = items.slice().sort(function (a, b) { return b.time - a.time; });
      var rows = items.length
        ? items.map(function (item) {
            return '<a href="' + esc(item.href) + '" class="sv-item">'
              + '<div class="sv-icon"><span class="material-symbols-sharp">' + s.icon + '</span></div>'
              + '<div class="sv-info">'
              +   '<span class="sv-name">' + esc(item.name) + '</span>'
              +   (item.time ? '<span class="sv-time">' + timeAgo(item.time) + '</span>' : '')
              + '</div>'
              + '<span class="material-symbols-sharp sv-arrow i-md">arrow_forward</span>'
              + '</a>';
          }).join('')
        : '<p class="sv-empty">Nothing saved here yet.</p>';

      return '<div class="sv-section">'
        + '<div class="sv-section-hdr">'
        +   '<span class="sv-eyebrow">' + s.label + '</span>'
        +   (items.length ? '<span class="sv-count">' + items.length + '</span>' : '')
        + '</div>'
        + rows
        + '</div>';
    }

    var root = document.getElementById('sv-root');
    var bar = document.getElementById('sv-bar');
    var search = document.getElementById('sv-search');
    var filterRow = document.getElementById('sv-filter');
    var svFilter = 'all';

    // categories read A to Z — the chips and the stacked sections agree
    sections.sort(function (a, b) { return a.label.localeCompare(b.label); });

    filterRow.innerHTML = '<button class="filter-chip active" data-filter="all">All</button>'
      + sections.map(function (s) {
          return '<button class="filter-chip" data-filter="' + s.key + '">' + s.label + '</button>';
        }).join('')
      + '<span class="result-count" id="sv-count"></span>';

    filterRow.addEventListener('click', function (e) {
      var chip = e.target.closest('.filter-chip');
      if (!chip) return;
      svFilter = chip.dataset.filter;
      filterRow.querySelectorAll('.filter-chip').forEach(function (c) {
        c.classList.toggle('active', c === chip);
      });
      render();
    });

    var loaded = sections.map(function (s) {
      return { section: s, items: s.load() };
    });
    var allItems = loaded.reduce(function (n, g) { return n + g.items.length; }, 0);

    function render() {
      var raw = search.value.trim();
      var q = raw.toLowerCase();
      var shown = 0;
      var html = '';

      loaded.forEach(function (g) {
        if (svFilter !== 'all' && g.section.key !== svFilter) return;
        var items = q
          ? g.items.filter(function (item) {
              return (item.name || '').toLowerCase().indexOf(q) !== -1;
            })
          : g.items;
        if (q && !items.length) return;
        shown += items.length;
        html += renderSection(g.section, items);
      });

      document.getElementById('sv-count').textContent =
        shown + ' item' + (shown !== 1 ? 's' : '');

      if (q && shown === 0) {
        root.innerHTML = '<div class="library-empty"><p class="library-empty-sub">Nothing matches &#8220;' + esc(raw) + '&#8221;.</p></div>';
        return;
      }

      root.innerHTML = html;
    }

    if (allItems === 0) {
      root.innerHTML = '<div class="library-empty">'
        + fsGhostRows()
        + '<p class="library-empty-headline">Everything you keep, in one place.</p>'
        + '<p class="library-empty-sub">Save a challenge, a chain, a cue sheet, or a playlist as you practice \u2014 this shelf fills itself.</p>'
        + '<div class="library-empty-actions"><a href="dashboard" class="btn-primary">Back to Dashboard</a></div>'
        + '</div>';
    } else {
      bar.hidden = false;
      filterRow.hidden = false;
      var searchT; // the list changes at typing pauses, not per keystroke
      search.addEventListener('input', function () {
        clearTimeout(searchT);
        searchT = setTimeout(render, 140);
      });
      render();
    }
  })();

  // ── the honesty line — what sync is actually doing, in mono ──
  (function () {
    var el = document.getElementById('sv-sync');
    if (!el || !window.fsSync) return;

    function rel(ms) {
      if (!ms) return 'just now';
      var s = Math.floor((Date.now() - ms) / 1000);
      if (s < 60) return 'just now';
      if (s < 3600) return Math.floor(s / 60) + 'm ago';
      if (s < 86400) return Math.floor(s / 3600) + 'h ago';
      return new Date(ms).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    // one persistent dot — classes toggle on it so the settle into
    // Synced eases (a rebuilt element can't transition)
    el.innerHTML = '<i></i><span></span>';
    var dot = el.querySelector('i');
    var txt = el.querySelector('span');

    // the pull happens on every load but often lands between frames —
    // the syncing needle dwells a moment so the instrument reads
    var bornAt = Date.now();
    var MIN_DWELL = 1200;
    var settleT = null;

    function render() {
      var st = fsSync.status();
      if (st.state === 'error') {
        dot.className = 'err';
        txt.innerHTML = 'Sync issue &mdash; retrying';
        return;
      }
      if (st.state === 'syncing') {
        dot.className = '';
        txt.innerHTML = 'Syncing&hellip;';
        return;
      }
      var wait = bornAt + MIN_DWELL - Date.now();
      if (wait > 0) {
        dot.className = '';
        txt.innerHTML = 'Syncing&hellip;';
        clearTimeout(settleT);
        settleT = setTimeout(render, wait + 30);
        return;
      }
      dot.className = 'on';
      txt.innerHTML = 'Synced &middot; ' + rel(st.at);
    }

    window.addEventListener('fs-sync-status', render);
    setInterval(render, 60000); // keep the relative time honest
    render();
  })();
  </script>


</body>
</html>
