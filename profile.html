<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile — Flow School</title>
<link rel="stylesheet" href="global.css">

<!--
  ─── SUPABASE SETUP REQUIRED ───────────────────────────────────────────────
  Run this SQL in your Supabase project (SQL Editor) before using this page:

  create table public.profiles (
    id uuid references auth.users(id) on delete cascade primary key,
    display_name text,
    bio text,
    teaching_style text,
    avatar_url text,
    website text,
    instagram text,
    updated_at timestamptz default now()
  );

  alter table public.profiles enable row level security;

  create policy "Public profiles are viewable by everyone"
    on public.profiles for select using (true);

  create policy "Users can insert their own profile"
    on public.profiles for insert with check (auth.uid() = id);

  create policy "Users can update their own profile"
    on public.profiles for update using (auth.uid() = id);

  -- Auto-create a profile row when a new user signs up
  create or replace function public.handle_new_user()
  returns trigger as $$
  begin
    insert into public.profiles (id) values (new.id);
    return new;
  end;
  $$ language plpgsql security definer;

  create trigger on_auth_user_created
    after insert on auth.users
    for each row execute procedure public.handle_new_user();

  -- Storage: create a public bucket called "avatars" in Supabase → Storage
  ───────────────────────────────────────────────────────────────────────── -->

<style>

body { opacity: 0; transition: opacity .18s; }

/* ── Page layout ── */
.profile-wrap {
  max-width: 820px;
  margin: 0 auto;
  padding: 32px 28px 120px;
}

/* ── Avatar upload ── */
.avatar-section {
  display: flex;
  align-items: center;
  gap: 24px;
  padding: 28px 32px;
  margin-bottom: 12px;
}

.avatar-preview {
  width: 72px; height: 72px; border-radius: 50%;
  background: var(--surface-2); border: 1px solid var(--border);
  object-fit: cover; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.75rem; font-weight: var(--weight-regular); color: var(--accent);
  overflow: hidden;
}
.avatar-preview img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

.avatar-info { flex: 1; }
.avatar-name { font-size: var(--text-body); font-weight: var(--weight-semibold); color: var(--text-1); margin-bottom: 4px; letter-spacing: -.01em; }
.avatar-email { font-size: var(--text-small); color: var(--text-3); margin-bottom: 12px; }

.avatar-upload-btn {
  position: relative; display: inline-flex; align-items: center;
  gap: 7px; overflow: hidden;
}
.avatar-upload-btn input[type=file] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%;
}
.avatar-uploading { font-size: var(--text-small); color: var(--text-3); margin-top: 8px; display: none; }
.avatar-uploading.show { display: block; }

/* ── Form card ── */
.profile-form-card { padding: 32px; }

.pf-section-label {
  font-size: var(--text-label); font-weight: var(--weight-bold);
  letter-spacing: var(--ls-label); text-transform: uppercase;
  color: var(--text-3); margin-bottom: 18px; display: block;
}

.pf-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
.pf-field:last-of-type { margin-bottom: 0; }

.pf-label {
  font-size: var(--text-label); font-weight: var(--weight-bold);
  letter-spacing: var(--ls-label); text-transform: uppercase; color: var(--text-3);
}

.pf-input {
  width: 100%; background: rgba(var(--ink-rgb),.04); border: 1px solid var(--border);
  border-radius: 0; padding: 12px 16px;
  color: var(--text-1); font-size: var(--text-body-sm); font-family: var(--font);
  outline: none; transition: border-color .15s, background .15s;
}
.pf-input:focus { border-color: rgba(var(--ink-rgb),.35); background: rgba(var(--ink-rgb),.06); }
.pf-input::placeholder { color: var(--text-3); }

textarea.pf-input { resize: vertical; min-height: 90px; line-height: 1.65; }

.pf-hint { font-size: var(--text-small); color: var(--text-3); margin-top: 5px; line-height: 1.5; }

.pf-divider { height: 1px; background: var(--border-light); margin: 24px 0; }

/* ── Social row ── */
.social-field { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.social-field:last-child { margin-bottom: 0; }
.social-icon { color: var(--text-3); flex-shrink: 0; font-size: 18px; }

/* ── Error / success ── */
.pf-error {
  font-size: var(--text-small); color: rgba(160,40,40,.85); line-height: 1.5;
  padding: 10px 14px; background: rgba(160,40,40,.05); border: 1px solid rgba(160,40,40,.14);
  border-radius: 0; margin-bottom: 14px; display: none;
}
.pf-error.show { display: block; }

.pf-success {
  font-size: var(--text-small); color: var(--text-2); line-height: 1.5;
  padding: 10px 14px; background: rgba(var(--ink-rgb),.05); border: 1px solid rgba(var(--ink-rgb),.14);
  border-radius: 0; margin-bottom: 14px; display: none;
}
.pf-success.show { display: block; }

/* ── Form actions ── */
.pf-actions {
  display: flex;
  gap: 10px;
  margin-top: 28px;
  padding-top: 24px;
  border-top: 1px solid var(--border-light);
}

@media (max-width: 580px) {
  .profile-wrap  { padding: 0 20px 60px; }
  .avatar-section { padding: 22px 20px; gap: 16px; }
  .profile-form-card { padding: 24px 20px; }
}
</style>
</head>
<body class="has-sidebar">

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<section class="hero">
  <div class="inner">
    <p class="page-eyebrow">Your account</p>
    <h1>Profile</h1>
  </div>
</section>

<div class="profile-wrap">

  <!-- Avatar + name -->
  <div class="card avatar-section">
    <div class="avatar-preview" id="avatar-preview">?</div>
    <div class="avatar-info">
      <div class="avatar-name" id="avatar-name">—</div>
      <div class="avatar-email" id="avatar-email">—</div>
      <div class="avatar-upload-btn btn-secondary">
        <span class="material-symbols-sharp">upload</span>
        Upload photo
        <input type="file" id="avatar-file" accept="image/*">
      </div>
      <div class="avatar-uploading" id="avatar-uploading">Uploading…</div>
    </div>
  </div>

  <!-- Profile form -->
  <div class="card profile-form-card">

    <div class="pf-error" id="pf-error"></div>
    <div class="pf-success" id="pf-success"></div>

    <span class="pf-section-label">About you</span>

    <div class="pf-field">
      <label class="pf-label" for="display-name">Display name</label>
      <input class="pf-input" type="text" id="display-name" placeholder="How you want to be known" autocomplete="name">
    </div>

    <div class="pf-field">
      <label class="pf-label" for="bio">Bio</label>
      <textarea class="pf-input" id="bio" placeholder="A few sentences about who you are and how you teach…" rows="4"></textarea>
    </div>

    <div class="pf-field">
      <label class="pf-label" for="teaching-style">Teaching style</label>
      <textarea class="pf-input" id="teaching-style" placeholder="e.g. Vinyasa-based, breath-led, creative sequencing…" rows="3"></textarea>
      <p class="pf-hint">What makes your teaching yours.</p>
    </div>

    <div class="pf-divider"></div>

    <span class="pf-section-label">Links</span>

    <div class="social-field">
      <span class="material-symbols-sharp social-icon">language</span>
      <input class="pf-input" type="url" id="website" placeholder="https://yoursite.com" autocomplete="url">
    </div>

    <div class="social-field">
      <span class="material-symbols-sharp social-icon">link</span>
      <input class="pf-input" type="text" id="instagram" placeholder="@yourhandle">
    </div>

    <div class="pf-actions">
      <button class="btn-primary" id="save-btn" disabled>Save profile</button>
      <button class="btn-ghost" id="discard-btn" disabled>Discard</button>
    </div>

  </div>

</div><!-- /.profile-wrap -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="lib/supabase.js"></script>
<script>

let currentUser = null;
let originalData = {};

// ─── INIT ────────────────────────────────────────────────────────────────────

async function init() {
  const { data: { user } } = await db.auth.getUser();
  if (!user) { window.location.href = 'login.html'; return; }
  currentUser = user;

  document.getElementById('avatar-email').textContent = user.email;
  document.body.style.opacity = '1';

  // Load profile
  const { data: profile } = await db
    .from('profiles')
    .select('display_name, bio, teaching_style, avatar_url, website, instagram')
    .eq('id', user.id)
    .single();

  if (profile) {
    setFields(profile);
    originalData = { ...profile };
  }
}

function setFields(p) {
  document.getElementById('display-name').value  = p.display_name    || '';
  document.getElementById('bio').value            = p.bio             || '';
  document.getElementById('teaching-style').value = p.teaching_style  || '';
  document.getElementById('website').value        = p.website         || '';
  document.getElementById('instagram').value      = p.instagram       || '';

  const name = p.display_name || currentUser?.email?.split('@')[0] || '?';
  document.getElementById('avatar-name').textContent = name;

  const preview = document.getElementById('avatar-preview');
  if (p.avatar_url) {
    preview.innerHTML = `<img src="${p.avatar_url}" alt="Profile photo">`;
  } else {
    preview.textContent = name.charAt(0).toUpperCase();
  }
}

// ─── AVATAR UPLOAD ───────────────────────────────────────────────────────────

document.getElementById('avatar-file').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file || !currentUser) return;

  const uploading = document.getElementById('avatar-uploading');
  uploading.classList.add('show');

  const ext      = file.name.split('.').pop();
  const path     = `${currentUser.id}/avatar.${ext}`;

  const { error: uploadError } = await db.storage
    .from('avatars')
    .upload(path, file, { upsert: true });

  if (uploadError) {
    uploading.classList.remove('show');
    showError('Photo upload failed. Make sure the "avatars" bucket exists in Supabase Storage.');
    return;
  }

  const { data: { publicUrl } } = db.storage.from('avatars').getPublicUrl(path);

  // Save avatar_url to profile
  await db.from('profiles').upsert({ id: currentUser.id, avatar_url: publicUrl });

  document.getElementById('avatar-preview').innerHTML = `<img src="${publicUrl}" alt="Profile photo">`;
  uploading.classList.remove('show');
  showSuccess('Photo updated.');
});

// ─── SAVE ────────────────────────────────────────────────────────────────────

// ─── DIRTY STATE ─────────────────────────────────────────────────────────────

const FIELD_IDS = ['display-name','bio','teaching-style','website','instagram'];

function getCurrentValues() {
  return {
    display_name:   document.getElementById('display-name').value.trim(),
    bio:            document.getElementById('bio').value.trim(),
    teaching_style: document.getElementById('teaching-style').value.trim(),
    website:        document.getElementById('website').value.trim(),
    instagram:      document.getElementById('instagram').value.trim(),
  };
}

function isDirty() {
  const cur = getCurrentValues();
  return (
    cur.display_name   !== (originalData.display_name   || '') ||
    cur.bio            !== (originalData.bio             || '') ||
    cur.teaching_style !== (originalData.teaching_style  || '') ||
    cur.website        !== (originalData.website         || '') ||
    cur.instagram      !== (originalData.instagram       || '')
  );
}

function updateButtons() {
  const dirty = isDirty();
  document.getElementById('save-btn').disabled    = !dirty;
  document.getElementById('discard-btn').disabled = !dirty;
}

FIELD_IDS.forEach(id => {
  document.getElementById(id).addEventListener('input', updateButtons);
});

// ─── SAVE ────────────────────────────────────────────────────────────────────

document.getElementById('save-btn').addEventListener('click', async () => {
  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.textContent = 'Saving…';
  clearMessages();

  const vals = getCurrentValues();

  const { error } = await db
    .from('profiles')
    .upsert({
      id: currentUser.id,
      display_name:   vals.display_name,
      bio:            vals.bio,
      teaching_style: vals.teaching_style,
      website:        vals.website,
      instagram:      vals.instagram,
      updated_at: new Date().toISOString(),
    });

  if (error) {
    showError(error.message || 'Save failed. Please try again.');
    btn.disabled = false;
  } else {
    originalData = { ...vals };
    document.getElementById('avatar-name').textContent = vals.display_name || currentUser.email.split('@')[0];
    showSuccess('Profile saved.');
    updateButtons();
  }

  btn.textContent = 'Save profile';
});

// ─── DISCARD ─────────────────────────────────────────────────────────────────

document.getElementById('discard-btn').addEventListener('click', () => {
  setFields(originalData);
  clearMessages();
  updateButtons();
});

// ─── MESSAGES ────────────────────────────────────────────────────────────────

function showError(msg) {
  const el = document.getElementById('pf-error');
  el.textContent = msg; el.classList.add('show');
  document.getElementById('pf-success').classList.remove('show');
}
function showSuccess(msg) {
  const el = document.getElementById('pf-success');
  el.textContent = msg; el.classList.add('show');
  document.getElementById('pf-error').classList.remove('show');
}
function clearMessages() {
  document.getElementById('pf-error').classList.remove('show');
  document.getElementById('pf-success').classList.remove('show');
}

init();
</script>
<script src="lib/nav.js"></script>
</body>
</html>
